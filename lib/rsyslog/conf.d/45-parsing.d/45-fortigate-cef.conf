if ($.parsing_done != 1 and
    $.app-name == "-" and
    $.msg startswith "CEF:0|" and
    tolower(field($.msg, 124, 3)) == "fortigate") then {

    action(
        type="mmnormalize"
        name="norm-cef-fortigate"
        variable="$.msg"
        path="$!cef"
        rule=[ "rule=:%.:cef%" ]
    )
    if ($parsesuccess == "OK") then {
        call ruleset-cef-common-mapping

        if ($!cef!Extensions!msg != "") then {
            set $!fortinet.msg = $!cef!Extensions!msg;
            unset $!cef!Extensions!msg;
        }

        if ($!cef!Extensions!requestContext != "") then {
            set $!fortinet.catdesc = $!cef!Extensions!requestContext;
            unset $!cef!Extensions!requestContext;
        }

        if ($!cef!Extensions!FTNTFGTlevel != "") then {
            set $!log.level = $!cef!Extensions!FTNTFGTlevel;
            unset $!cef!Extensions!FTNTFGTlevel;
        }

        if ($!cef!Extensions!FTNTFGTsrcmac != "") then {
            set $!source.mac = $!cef!Extensions!FTNTFGTsrcmac;
            unset $!cef!Extensions!FTNTFGTsrcmac;
        }
        if ($!cef!Extensions!FTNTFGTdstmac != "") then {
            set $!destination.mac = $!cef!Extensions!FTNTFGTdstmac;
            unset $!cef!Extensions!FTNTFGTdstmac;
        }

        if ($!cef!Extensions!FTNTFGTsentpkt != "") then {
            set $!source.packets = $!cef!Extensions!FTNTFGTsentpkt;
            unset $!cef!Extensions!FTNTFGTsentpkt;
        }
        if ($!cef!Extensions!FTNTFGTrcvdpkt != "") then {
            set $!destination.packets = $!cef!Extensions!FTNTFGTrcvdpkt;
            unset $!cef!Extensions!FTNTFGTrcvdpkt;
        }

        set $!data_stream.dataset = "firewall.fortigate";
        set $.parsing_done = 1;
    }
}
