if ($.parsing_done != 1 and
    $.app-name == ["squid", "(squid)", "(squid-1)"]) then {

    action(
        type="mmnormalize"
        rulebase="squid.rb"
        name="norm-squid"
        variable="$.msg"
        path="$!"
    )

    if ($!service.type == "squid") then {
        if ($!url.original != "") then {
            # Parse the URL
            action(
                type="mmnormalize"
                rulebase="url.rb"
                name="norm-squid-url"
                variable="$!url.original"
                path="$!"
            )
        }

        if ($!url.scheme == "" and $!http.request.method == "CONNECT") then
            set $!url.scheme = "<connect>";

        set $!data_stream.dataset = "proxy.squid";
        set $.parsing_done = 1;
    }
}
