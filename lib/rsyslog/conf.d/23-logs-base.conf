template(name="template-timereported" type="list") {
    property(name="timereported" dateformat="rfc3339")
}

template(name="template-timegenerated" type="list") {
    property(name="timegenerated" dateformat="rfc3339")
}

# Reset property containers. This clears all potential properties created by
# the input module (eg: imjournal systemd properties) so we keep them under
# $.inmeta in case they are needed.
unset $.;
if (exists($!)) then
    set $.inmeta = $!;
unset $!;

# Use some key properties from $., this allows to override them for instance
# if the parsers did not understand properly the raw message.
#
# Notes regarding rsyslog vanilla properties:
# - Rsyslog $hostname, assumed non empty, default "127.0.0.1".
# - Rsyslog $fromhost-ip, assumed non empty, default "127.0.0.1".
# - Rsyslog $app-name, never seen it empty, default "-".
# - Rsyslog $procid, seen empty ex: <1>host prog[] msg.
# - Rsyslog $syslogtag can be empty and does NOT default to "-".
#
# When there are syslog relays in place, in order to keep track of the original
# source IP, it is common to append /$fromhost-ip to the $hostname field before
# relaying a message. This trick works with rfc3164 as well as rfc5434.
# Example:
# - Sending host will produce:
#       (a) $hostname = websrv1 (as usual, which could also be an IP)
#       (b) $hostname = websrv1/srcip1 (or may send both)
# - Syslog relay #1 append the source IP and forward as
#       (a) $hostname = websrv1/srcip1
#       (b) $hostname = websrv1/srcip1/srcip1
# - Syslog relay #2 append the source IP and forward as
#       (a) $hostname = websrv1/srcip1/srcip2
#       (b) $hostname = websrv1/srcip1/srcip1/srcip2
# - etc.
#
# In the end, we can try to parse the $hostname field with mmnormalize as
# $.hostname[/$.fromhost-ip[/...]] and if stick to vanilla rsyslog properties
# if parsing fails.

action(
    type="mmnormalize"
    name="norm-hostname-slash-ip"
    rulebase=`echo $LIBLOGNORM_RULEBASES/hostname-slash-ip.rb`
    variable="hostname"
    path="$."
)
if ($.hostname == "") then
    set $.hostname = $hostname;
if ($.fromhost-ip == "") then
    set $.fromhost-ip = $fromhost-ip;

set $.app-name = $app-name;
set $.procid = $procid;

if ($protocol-version == 0) then {
    # Cases for most likely wrong rfc3164 parsing.
    if ($app-name == "-" and $syslogtag != ["","[]","[]:"]) then {
        set $.msg = $syslogtag & $msg;
    }
    else if ($app-name == "CEF" and $syslogtag == "CEF:" and $msg startswith "0|") then {
        set $.msg = $syslogtag & $msg;
        set $.app-name = "-";
    }
}
else if ($structured-data startswith "[lcReinject@0 id=\"") then {
    # Reinject format is rfc5424 with a specific SD element for reinject
    # properties. That SD element must be first, with SD-ID lcReinject@0
    # and must include SD-PARAM id.
    #
    # <${pri}>1 \
    #       ${timereported-rfc3339} OR ${timegenerated-rfc3339} \   # (1)
    #       ${hostname} OR ${hostname}/${fromhost-ip} \             # (2)
    #       ${app-name} ${procid} ${msgid} \
    #       [lcReinject@0 \
    #           id="${rj_id}" \
    #           timeReceived="${timegenerated-rfc3339}" OPTIONAL \
    #           srcIp="${fromhost-ip}" OPTIONAL \
    #       ]${structured-data} \
    #       ${msg}
    #
    # (1) If timegenerated is given in standard timestamp syslog field,
    # it does not make sense to give it as well in SD. The SD shall be used
    # only to give timegenerated when the original timereported is given
    # in the syslog field.
    # (2) The source IP should be given either in standard syslog hostname
    # field or in SD.

    # Parse rfc5424 structured-data to retrieve reinject properties.
    # Note if parsers need other SD elements, they should test for
    # not(exists($.rfc5424-sd)) before calling the mmpstrucdata action in
    # order to avoid parsing twice.
    action(type="mmpstrucdata" name="parse-sd-reinject" jsonroot=".")

    if ($.rfc5424-sd!lcReinject@0!id != "") then {
        set $.rj_id = $.rfc5424-sd!lcReinject@0!id;
        if ($.rfc5424-sd!lcReinject@0!timeReceived) then
            set $.timegenerated-rfc5424 = $.rfc5424-sd!lcReinject@0!timeReceived;
        else
            set $.timegenerated-rfc5424 = exec_template("template-timereported");
        if ($.rfc5424-sd!lcReinject@0!srcIp) then
            set $.fromhost-ip = $.rfc5424-sd!lcReinject@0!srcIp;
    }

    unset $.rfc5424-sd!lcReinject@0;
}

# Use these in parsers for the $!@timestamp property if needed.
if ($.timegenerated-rfc3339 == "") then
    set $.timegenerated-rfc3339 = exec_template("template-timegenerated");
if ($.timereported-rfc3339 == "") then
    set $.timereported-rfc3339 = exec_template("template-timereported");

if ($.msg == "") then
    set $.msg = $msg;
