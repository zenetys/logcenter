input(
    type="imuxsock"
    config.enabled=`echo $ZLC_LISTEN_UXSOCK`
    socket=`echo $ZLC_LISTEN_UXSOCK_SOCKET`
    name="local-uxsock"
)

input(
    type="imudp"
    config.enabled=`echo $ZLC_LISTEN_UDP`
    address=`echo $ZLC_LISTEN_UDP_ADDRESS`
    port=`echo $ZLC_LISTEN_UDP_PORT`
    name="net-udp"
    rcvbufsize="16777216"
)

input(
    type="imtcp"
    config.enabled=`echo $ZLC_LISTEN_TCP`
    address=`echo $ZLC_LISTEN_TCP_ADDRESS`
    port=`echo $ZLC_LISTEN_TCP_PORT`
    name="net-tcp"
)

input(
    type="imrelp"
    config.enabled=`echo $ZLC_LISTEN_RELP`
    address=`echo $ZLC_LISTEN_RELP_ADDRESS`
    port=`echo $ZLC_LISTEN_RELP_PORT`
    name="net-relp"
    keepalive="on"
    keepalive.time="30"
    keepalive.interval="30"
    keepalive.probes="6"
    #tls="off"
    #tls.cacert="/etc/pki/ca-trust/source/anchors/ca.crt"
    #tls.authmode="certvalid"
    #tls.myprivkey="/etc/pki/tls/private/$HOSTNAME.key"
    #tls.mycert="/etc/pki/tls/certs/$HOSTNAME.crt"
)
