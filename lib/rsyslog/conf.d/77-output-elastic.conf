template(name="template-dyn-es-index" type="list") {
    property(name="$.es_index")
}

template(name="template-dyn-es-pipeline" type="list") {
    property(name="$.es_pipeline")
}

template(name="template-format-elastic" type="list") {
    property(name="$!")
    constant(value="\n")
}

if ($.es_index != "") then {
    action(
        config.enabled=`echo $ZLC_OUTPUT_ELASTIC`
        type="omelasticsearch"
        name="out-elastic"
        server=`echo $ZLC_OUTPUT_ELASTIC_SERVER`
        tls.cacert=`echo $ZLC_OUTPUT_ELASTIC_CACERT`
        allowunsignedcerts=`echo $ZLC_OUTPUT_ELASTIC_INSECURE`
        skipverifyhost=`echo $ZLC_OUTPUT_ELASTIC_INSECURE`
        uid=`echo $ZLC_OUTPUT_ELASTIC_UID`
        pwd=`echo $ZLC_OUTPUT_ELASTIC_PWD`
        dynsearchindex="on"
        searchindex="template-dyn-es-index"
        dynpipelinename="on"
        pipelinename="template-dyn-es-pipeline"
        skippipelineifempty="on"
        template="template-format-elastic"
        bulkmode="on"
        writeoperation="create"
        maxbytes="100m"
        errorfile=`echo $ZLC_LOG_DIR/es-errors.log`
        esversion.major="8"

        queue.type="LinkedList"
        queue.size="30000"
        queue.timeoutenqueue="5000"
        queue.dequeuebatchsize="8000"
        queue.workerthreads="2"
        queue.workerthreadminimummessages="7000"

        action.resumeretrycount="-1"
        action.resumeinterval="5"
        action.resumeintervalmax="5"
        action.reportsuspension="on"
        action.reportsuspensioncontinuation="on"

        # disk assisted queue
        queue.maxfilesize="25m"
        queue.maxdiskspace="500m"
        queue.saveonshutdown="on"
        queue.filename="out-elastic"
    )
}
