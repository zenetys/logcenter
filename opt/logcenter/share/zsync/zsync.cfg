for cfginc in /etc/logcenter/zsync-*.inc.cfg; do
    source "$cfginc"
done

SSH_IDENTITY=/etc/logcenter/zsync.key
SSH_USER=zsync
BECOMEROOT=1

INCLUDES=(
    /etc/cron.d/logcenter-*
    /etc/keepalived
    /etc/logcenter
    /etc/logrotate.d/*logcenter*
    /etc/profile.d/logcenter-*
    /etc/rsyslog.d
    /etc/systemd/system/rsyslog.service.d
    # pattern because may not exist
    /etc/systemd/system/sigfiled[.]service
    /opt/logcenter
)

EXCLUDES=(
    '.*.swp'
    /etc/keepalived/logcenter.pref
    /etc/logcenter/logcenter-local.inc.conf
    /etc/logcenter/zsync.key{,.pub}
)
