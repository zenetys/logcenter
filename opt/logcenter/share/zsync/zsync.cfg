source /etc/logcenter/zsync-peers.inc.cfg

SSH_IDENTITY=/etc/logcenter/zsync.key
SSH_USER=zsync
BECOMEROOT=1

INCLUDES=(
    /etc/cron.d/logcenter-*
    /etc/keepalived
    /etc/logcenter
    /etc/profile.d/logcenter-*
    /etc/rsyslog.d
    /etc/systemd/system/rsyslog.service.d/logcenter.conf
    /opt/logcenter
)

EXCLUDES=(
    '.*.swp'
    /etc/keepalived/logcenter.pref
    /etc/logcenter/zsync.key{,.pub}
)
