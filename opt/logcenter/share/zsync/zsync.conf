for inc in /etc/logcenter/zsync-*.inc.conf; do
    source "$inc"
done

SSH_IDENTITY=/etc/logcenter/zsync.key
SSH_USER=zsync
BECOMEROOT=1

INCLUDES=(
    /etc/cron.d/logcenter-*
    /etc/[k]eepalived
    /etc/logcenter
    /etc/logrotate.d/*logcenter*
    /etc/profile.d/logcenter-*
    /etc/rsyslog.d
    /etc/systemd/system/[r]syslog.service.d
    /etc/systemd/system/[s]igfiled.service
    /opt/logcenter
    /var/lib/[g]eoip
)

if [[ -L /var/lib/geoip ]]; then
    INCLUDES+=( $(readlink -f /var/lib/geoip) )
fi

EXCLUDES=(
    '.*.swp'
    /etc/keepalived/logcenter.pref
    /etc/logcenter/logcenter-local.inc.conf
    /etc/logcenter/zsync.key{,.pub}
)
