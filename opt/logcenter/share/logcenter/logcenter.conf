ZLC_LISTEN_PARSING=off
ZLC_LISTEN_PARSING_ADDRESS=0.0.0.0
ZLC_LISTEN_PARSING_PORT=3514
ZLC_PARSING=off
ZLC_PARSING_HOST=
ZLC_PARSING_PORT=3514
ZLC_PARSING_UNFLATTEN=on
ZLC_PARSING_LOAD_ALL_PARSERS=off
