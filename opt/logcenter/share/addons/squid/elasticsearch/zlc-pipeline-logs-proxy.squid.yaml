version: 1

on_failure:
  - append: { field: error.message, value: '{{{ _ingest.on_failure_message }}}' }
  - set: { field: event.kind, value: pipeline_error }

processors:
  - script:
      lang: painless
      source: |
        ctx['@timestamp'] = (long)(ctx['@timestamp'] * 1000);

  # try to isolate the registered domain
  - registered_domain:
      field: url.domain
      target_field: url
      ignore_missing: true
      ignore_failure: true

  # try to get a destination IP out of squid.last_peer
  - convert:
      if: ctx.destination?.ip == null &&
          ctx.squid?.last_peer != null &&
          ctx.squid?.last_peer != '-'
      field: squid.last_peer
      target_field: destination.ip
      type: ip
      ignore_failure: true

  # try to get a destination IP out of url.domain
  - convert:
      if: ctx.destination?.ip == null &&
          ctx.url?.domain != null
      field: url.domain
      target_field: destination.ip
      type: ip
      ignore_failure: true
