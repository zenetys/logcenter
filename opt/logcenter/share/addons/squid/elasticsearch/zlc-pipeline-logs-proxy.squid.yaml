version: 1

on_failure:
  - append: { field: error.message, value: '{{{ _ingest.on_failure_message }}}' }
  - set: { field: event.kind, value: pipeline_error }

processors:
  - script:
      lang: painless
      source: |
        ctx['@timestamp'] = (long)(ctx['@timestamp'] * 1000);

  - registered_domain:
      field: url.domain
      target_field: url
