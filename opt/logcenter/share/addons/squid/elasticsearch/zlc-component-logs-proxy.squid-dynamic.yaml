version: 1
template:
  mappings:
    dynamic_templates:

      - squid_keyword_and_text_simple:
          path_match:
            - 'squid.request_status'
            - 'squid.hierarchy_status'
          match_mapping_type: string
          mapping:
            type: keyword
            ignore_above: 1024
            fields:
              text:
                # like match_only_text but with simple analyzer
                type: text
                index_options: docs
                norms: false
                analyzer: simple
