version: 1
index_patterns:
  - logs-keycloak-zlc
  - logs-keycloak-zlc.*
priority: 700
composed_of:
  - zlc-component-logs-keycloak-dynamic
  - zlc-component-logs-keycloak-dynamic@custom
  - logs@mappings
  - ecs@mappings
  - zlc-component-default
  - zlc-component-default@custom
  - zlc-component-logs@custom
  - zlc-component-logs-keycloak@custom
ignore_missing_component_templates:
  - zlc-component-logs-keycloak-dynamic@custom
  - zlc-component-default@custom
  - zlc-component-logs@custom
  - zlc-component-logs-keycloak@custom
data_stream: {}
template:
  mappings:
    properties:
      # alias event.dataset to data_stream.dataset
      data_stream.dataset: { type: constant_keyword }
      event.dataset: { type: alias, path: 'data_stream.dataset' }

      # alias process.name to log.syslog.appname
      log.syslog.appname: { type: keyword, fields: { text: { type: match_only_text } } }
      process.name: { type: alias, path: log.syslog.appname }

      # alias process.pid to log.syslog.procid
      log.syslog.procid: { type: keyword, fields: { long: { type: long } } }
      process.pid: { type: alias, path: log.syslog.procid.long }

      # alias user.name to keycloak.username
      # alias source.user.name to keycloak.username
      keycloak.username: { type: keyword, fields: { text: { type: match_only_text } } }
      user.name: { type: alias, path: keycloak.username }
      source.user.name: { type: alias, path: keycloak.username }

      # alias user.id to keycloak.userId
      # alias source.user.id to keycloak.userId
      keycloak.userId: { type: keyword }
      user.id: { type: alias, path: keycloak.userId }
      source.user.id: { type: alias, path: keycloak.userId }
