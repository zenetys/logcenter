version: 1

on_failure:
  - append: { field: error.message, value: '{{{ _ingest.on_failure_message }}}' }
  - set: { field: event.kind, value: pipeline_error }

processors:
  - fail:
      message: 'haproxy.* fields expected'
      if: (ctx.haproxy instanceof Map) == false

  - date:
      if: "ctx['@timestamp'] instanceof String && ctx['@timestamp'].charAt(2) == 47 /* slash */"
      field: '@timestamp'
      timezone: '{{{ _.tz }}}'
      formats: [ 'dd/MMM/yyyy:HH:mm:ss.SSS' ]

  # Expected and assumed field types from JSON input, when set, for the
  # processing that follows. (*) required
  #
  # event: object (*)
  # http.response.status_code: long
  # http.version: string
  # tls.version: string
  # tls.resumed: long
  # haproxy.frontend_name: string
  # haproxy.logasap: long
  # haproxy.redispatched: long
  # haproxy.others: string
  # haproxy.total_time_ms: long
  # haproxy.http.captured_headers: string
  # haproxy.http.request.captured_headers: string
  # haproxy.http.response.captured_headers: string

  - script:
      lang: painless
      source: |
        // field http.version should not contain "HTTP/" prefix
        if (ctx.http?.version != null && ctx.http.version.startsWith('HTTP/'))
            ctx.http.version = ctx.http.version.substring(5);

        // field tls.version should not contain "TLSv" prefix
        // split into fields tls.version and tls.version_protocol
        // see https://www.elastic.co/guide/en/ecs/current/ecs-tls.html
        // sample input: SSLv3, TLSv1.3
        if (ctx.tls?.version != null) {
            int vpos = ctx.tls.version.indexOf('v');
            if (vpos > 0 && vpos < ctx.tls.version.length()-1) {
                ctx.tls.version_protocol = ctx.tls.version.substring(0, vpos).toLowerCase();
                ctx.tls.version = ctx.tls.version.substring(vpos+1);
            }
        }

        // add haproxy.frontend_ssl true flag
        if (ctx.haproxy.frontend_name != null && ctx.haproxy.frontend_name.endsWith('~'))
            ctx.haproxy.frontend_ssl = true;

        // tls.resumed, expected as number, should be indexed as boolean
        if (ctx.tls?.resumed != null)
            ctx.tls.resumed = ctx.tls.resumed == 1 ? true : false;

        // haproxy.logasap, expected as number 1, should be indexed as true flag
        if (ctx.haproxy.logasap != null) {
            if (ctx.haproxy.logasap == 1)
                ctx.haproxy.logasap = true;
            else
                ctx.haproxy.remove('logasap');
        }

        // haproxy.connections.redispatched, expected as number 1, should be indexed as true flag
        if (ctx.haproxy.connections?.redispatched != null) {
            if (ctx.haproxy.connections.redispatched == 1)
                ctx.haproxy.connections.redispatched = true;
            else
                ctx.haproxy.connections.remove('redispatched');
        }

        // haproxy.log.truncated, if set, should be indexed as true flag
        if (ctx.haproxy.log?.truncated != null)
            ctx.haproxy.log.truncated = true;

        // event.duration
        if (ctx.haproxy.total_time_ms != null)
            ctx.event.duration = ctx.haproxy.total_time_ms * 1000000L;

        // captured_headers
        if (ctx.haproxy.http?.captured_headers != null)
            ctx.haproxy.http.captured_headers = ctx.haproxy.http.captured_headers.splitOnToken('|');
        if (ctx.haproxy.http?.request?.captured_headers != null)
            ctx.haproxy.http.request.captured_headers = ctx.haproxy.http.request.captured_headers.splitOnToken('|');
        if (ctx.haproxy.http?.response?.captured_headers != null)
            ctx.haproxy.http.response.captured_headers = ctx.haproxy.http.response.captured_headers.splitOnToken('|');

      on_failure:
        # continue but track errors
        - append: { field: error.message, value: 'main script: {{{ _ingest.on_failure_message }}}' }
        - set: { field: event.kind, value: pipeline_error }

  - pipeline:
      if: ctx.haproxy.others != null
      name: zlc-pipeline-logs-rp.haproxy-others-kv
      on_failure:
        # continue but track errors
        - append: { field: error.message, value: 'others-kv pipeline: {{{ _ingest.on_failure_message }}}' }
        - set: { field: event.kind, value: pipeline_error }

  - set:
      if: ctx.client?.ip == null && ctx.source?.ip != null
      field: client.ip
      copy_from: source.ip
  - set:
      if: ctx.haproxy.bytes_uploaded != null && ctx.http != null
      field: http.request.bytes
      copy_from: haproxy.bytes_uploaded

  # try to get a destination IP out of url.domain
  - convert:
      if: ctx.destination?.ip == null &&
          ctx.url?.domain != null
      field: url.domain
      target_field: destination.ip
      type: ip
      ignore_failure: true
