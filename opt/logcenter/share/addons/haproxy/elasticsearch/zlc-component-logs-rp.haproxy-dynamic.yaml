version: 1
template:
  mappings:
    dynamic_templates:

      # KV fiels parsed from haproxy.others give strings.
      # Some conversion may not be needed with these rules.
      - haproxy_long:
          match_mapping_type: string
          path_match:
            - '*.bytes'
            - 'bytes_*'
            - '*_time_ms'
            - 'time_*_ms'
          mapping:
            type: long

      - haproxy_keyword_and_text:
          path_match:
            - 'haproxy.error_message'
          match_mapping_type: string
          mapping:
            type: keyword
            ignore_above: 1024
            fields:
              text:
                type: match_only_text
