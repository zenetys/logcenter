version: 1

on_failure:
  - append: { field: error.message, value: '{{{ _ingest.on_failure_message }}}' }
  - set: { field: event.kind, value: pipeline_error }

processors:
  - date:
      ignore_failure: true
      if: ctx.w3c?.timestamp_raw instanceof String && ctx._?.tz instanceof String
      field: w3c.timestamp_raw
      target_field: w3c.timestamp
      timezone: '{{{ _.tz }}}'
      formats:
        - dd/MMM/yyyy:HH:mm:ss
        - dd/MMM/yyyy:HH:mm:ss XX
        - EEE MMM dd H:m:s yyyy
        - EEE MMM dd H:m:s.SSSSSS yyyy
        - dd/MM/yyyy HH:mm:ss.SSS

  - uri_parts:
      field: url.original
      target_field: url
      keep_original: true
      ignore_missing: true
      ignore_failure: true
