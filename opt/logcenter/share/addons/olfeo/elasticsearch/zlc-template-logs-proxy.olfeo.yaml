version: 1
index_patterns:
  - logs-proxy.olfeo-zlc
  - logs-proxy.olfeo-zlc.*
priority: 700
composed_of:
  - zlc-component-logs-proxy.olfeo-dynamic
  - zlc-component-logs-proxy.olfeo-dynamic@custom
  - logs@mappings
  - ecs@mappings
  - zlc-component-default
  - zlc-component-default@custom
  - zlc-component-logs@custom
  - zlc-component-logs-proxy.olfeo@custom
ignore_missing_component_templates:
  - zlc-component-logs-proxy.olfeo-dynamic@custom
  - zlc-component-default@custom
  - zlc-component-logs@custom
  - zlc-component-logs-proxy.olfeo@custom
data_stream: {}
template:
  mappings:
    properties:
      # alias event.dataset to data_stream.dataset
      data_stream.dataset: { type: constant_keyword }
      event.dataset: { type: alias, path: 'data_stream.dataset' }

      # alias event.reason to olfeo.answer_reason
      olfeo.answer_reason: { type: keyword }
      event.reason: { type: alias, path: olfeo.answer_reason }

      # alias event.code to olfeo.answer_reason_code
      olfeo.answer_reason_code: { type: keyword }
      event.code: { type: alias, path: olfeo.answer_reason_code }

      # alias source.user.domain to user.domain
      user.domain: { type: keyword }
      source.user.domain: { type: alias, path: user.domain }
      # alias source.user.name to user.name
      user.name: { type: keyword, fields: { text: { type: match_only_text } } }
      source.user.name: { type: alias, path: user.name }
