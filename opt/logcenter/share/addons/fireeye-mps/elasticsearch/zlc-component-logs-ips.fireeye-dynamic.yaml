version: 1
template:
  mappings:
    dynamic_templates:

      - fireeye_ip:
          path_match:
            - 'fireeye.*.ip'
          match_mapping_type: string
          mapping:
            type: ip

      - fireeye_keyword_and_text:
          path_match:
            - 'fireeye.*.sig-name'
          match_mapping_type: string
          mapping:
            type: keyword
            fields:
              text:
                type: match_only_text
