version: 3

on_failure:
  - append: { field: error.message, value: '{{{ _ingest.on_failure_message }}}' }
  - set: { field: event.kind, value: pipeline_error }

processors:
  # Processors require keys to be unflatten in order to match fields.
  - dot_expander:
      field: '*'

  # Store ingest time.
  - set:
      field: event.ingested
      copy_from: _ingest.timestamp

  # Use received @timestamp as default event.created. It is most probably the
  # time of reception on the syslog collector before reaching elasticsearch.
  - set:
      field: event.created
      copy_from: '@timestamp'
      ignore_empty_value: true
      override: false

  # Those fields should be arrays. As it is tough to build JSON arrays from
  # rsyslog, we make comma-separated strings, so split them.
  - split: { field: event.category, separator: '[,\s]+', if: 'ctx?.event?.category instanceof String' }
  - split: { field: event.type, separator: '[,\s]+', if: 'ctx?.event?.type instanceof String' }
  - split: { field: tags, separator: '[,\s]+', if: 'ctx?.tags instanceof String' }
  - split: { field: zlc.relay_path, separator: '/', if: 'ctx?.zlc?.relay_path instanceof String' }

  # Hook for a per-datastream pipeline.
  - pipeline:
      name: zlc-pipeline-logs-{{{ data_stream.dataset }}}
      if: ctx.data_stream?.type == 'logs' && ctx.data_stream?.dataset != null
      ignore_missing_pipeline: true

  # Set default @timestamp value.
  - set:
      field: '@timestamp'
      copy_from: _ingest.timestamp
      override: false

  - user_agent: { field: user_agent.original, ignore_missing: true }
  - lowercase: { field: email.bcc.address, ignore_missing: true }
  - lowercase: { field: email.cc.address, ignore_missing: true }
  - lowercase: { field: email.from.address, ignore_missing: true }
  - lowercase: { field: email.reply_to.address, ignore_missing: true }
  - lowercase: { field: email.sender.address, ignore_missing: true }
  - lowercase: { field: email.to.address, ignore_missing: true }
  - lowercase: { field: url.domain, ignore_missing: true }

  - pipeline:
      name: zlc-pipeline-geoip
      if: ctx._?.enable_pipeline_geoip != false
      ignore_missing_pipeline: true

  # Hook for a per-datastream custom pipeline.
  - pipeline:
      name: zlc-pipeline-logs-{{{ data_stream.dataset }}}@custom
      if: ctx.data_stream?.type == 'logs' && ctx.data_stream?.dataset != null
      ignore_missing_pipeline: true

  # Remove null or empty fields.
  - script:
      id: zlc-script-ingest-remove-empty-fields
      if: ctx._?.enable_remove_empty_fields != false
      params:
        empty_string_path: [ '_', 'remove_empty_string' ]
        # fallback if _.remove_empty_string is null
        empty_string: [ '', '-' ]

  - pipeline:
      name: zlc-pipeline-related-ip
      if: ctx._?.enable_pipeline_related_ip != false
      ignore_missing_pipeline: true

  - pipeline:
      name: zlc-pipeline-related-user
      if: ctx._?.enable_pipeline_related_user != false
      ignore_missing_pipeline: true

  - remove:
      field: _
      ignore_missing: true
