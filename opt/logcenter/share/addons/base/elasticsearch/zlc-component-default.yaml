version: 2
template:
  settings:
    index:
      lifecycle:
        name: zlc-lifecycle-default
      codec: best_compression
      refresh_interval: 10s
      number_of_shards: "1"
      number_of_replicas: "1"
      auto_expand_replicas: "0-1"
      default_pipeline: zlc-pipeline-default
      sort:
        field: '@timestamp'
        order: desc
      mapping:
        ignore_malformed: "true"
        total_fields:
          limit: 1000
          ignore_dynamic_beyond_limit: "true"
  mappings:
    date_detection: false
    numeric_detection: false
