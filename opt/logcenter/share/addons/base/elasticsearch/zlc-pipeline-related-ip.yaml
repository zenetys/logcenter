version: 3

on_failure:
  - append: { field: error.message, value: '{{{ _ingest.on_failure_message }}}' }
  - set: { field: event.kind, value: pipeline_error }

processors:
  - append:
        field: related.ip
        value: '{{{ source.ip }}}'
        allow_duplicates: false
        if: ctx.source?.ip != null
  - append:
        field: related.ip
        value: '{{{ source.nat.ip }}}'
        allow_duplicates: false
        if: ctx.source?.nat?.ip != null
  - append:
        field: related.ip
        value: '{{{ destination.ip }}}'
        allow_duplicates: false
        if: ctx.destination?.ip != null
  - append:
        field: related.ip
        value: '{{{ destination.nat.ip }}}'
        allow_duplicates: false
        if: ctx.destination?.nat?.ip != null
  - append:
        field: related.ip
        value: '{{{ client.ip }}}'
        allow_duplicates: false
        if: ctx.client?.ip != null
  - append:
        field: related.ip
        value: '{{{ server.ip }}}'
        allow_duplicates: false
        if: ctx.server?.ip != null
  - foreach:
      field: dns.resolved_ip
      if: ctx.dns?.resolved_ip != null && ctx.dns.resolved_ip instanceof List
      processor:
        append:
          field: related.ip
          value: '{{{ _ingest._value }}}'
          allow_duplicates: false
