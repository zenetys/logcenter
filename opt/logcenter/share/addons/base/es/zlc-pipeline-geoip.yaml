version: 3

on_failure:
  - set:
      field: error.message
      value: '{{{ _ingest.on_failure_message }}}'

processors:
  - geoip:
      field: source.ip
      target_field: source.geo
      properties:
        - location
        - country_iso_code
        - country_name
        - continent_name
      ignore_missing: true
      ignore_failure: true
  - geoip:
      field: destination.ip
      target_field: destination.geo
      properties:
        - location
        - country_iso_code
        - country_name
        - continent_name
      ignore_missing: true
      ignore_failure: true
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: source.ip
      target_field: source.as
      properties:
        - organization_name
      ignore_missing: true
      ignore_failure: true
  - geoip:
      database_file: GeoLite2-ASN.mmdb
      field: destination.ip
      target_field: destination.as
      properties:
        - organization_name
      ignore_missing: true
      ignore_failure: true
  - rename:
      field: source.as.organization_name
      target_field: source.as.organization.name
      ignore_missing: true
  - rename:
      field: destination.as.organization_name
      target_field: destination.as.organization.name
      ignore_missing: true
