policy:
  _meta:
    version: 1
  phases:
    hot:
      min_age: 0ms
      actions:
        set_priority:
          priority: 100
        rollover:
          max_age: 7d
          max_primary_shard_size: 10gb
    warm:
      min_age: 30d
      actions:
        set_priority:
          priority: 50
    cold:
      min_age: 60d
      actions:
        set_priority:
          priority: 0
    delete:
      min_age: 365d
      actions:
        delete:
          delete_searchable_snapshot: true
