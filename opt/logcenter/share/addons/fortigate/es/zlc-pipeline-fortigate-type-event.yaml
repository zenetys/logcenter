version: 3

on_failure:
  - append: { field: error.message, value: '{{{ _ingest.on_failure_message }}}' }
  - set: { field: event.kind, value: pipeline_error }

processors:
  - script:
      lang: painless
      source: |
        ctx.event.kind = 'event';

        if (ctx.fortigate.result == 'ERROR' || ctx.fortigate.status == 'negotiate_error')
            ctx.event.outcome = 'failure';
        else if (ctx.fortigate.result == 'OK')
            ctx.event.outcome = 'success';

        def action = ctx.fortigate.action;
        if (action == 'FSSO-logon' || action == 'auth-logon') {
            ctx.event.outcome = 'success';
            ctx.event.type.add('start');
        }
        else if (action == 'FSSO-logoff' || action == 'auth-logout') {
            ctx.event.outcome = 'success';
            ctx.event.type.add('end');
        }

        if (action == 'perf-stats') {
            ctx.event.category.add('host');
            ctx.event.type.add('info');
        }

        if (ctx.fortigate.subtype == 'vpn') {
            ctx.event.category.add('network');
            ctx.event.type.add('connection');
        }
        else if (ctx.fortigate.subtype == 'update') {
            ctx.event.category.add('host');
            ctx.event.type.add('info');
        }
        else if (ctx.fortigate.subtype == 'user') {
            ctx.event.category.add('authentication');
        }
