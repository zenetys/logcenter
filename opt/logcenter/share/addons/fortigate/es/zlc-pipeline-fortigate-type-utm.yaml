version: 3

on_failure:
  - append: { field: error.message, value: '{{{ _ingest.on_failure_message }}}' }
  - set: { field: event.kind, value: pipeline_error }

processors:
  - script:
      lang: painless
      source: |
        ctx.event.kind = 'event';
        ctx.event.category.add('network');

        def action = ctx.fortigate.action;
        if (action instanceof String) {
            if (action.startsWith('block') || action.startsWith('drop') ||
                action.startsWith('reset') || action == 'reject') {
                ctx.event.outcome = 'failure';
                ctx.event.type.add('denied');
            }
            else {
                ctx.event.outcome = 'success';
                if (action == 'pass' || action == 'passthrough' ||
                    action == 'detected' || action == 'redirect')
                    ctx.event.type.add('allowed');
            }
        }
