version: 1
template:
  mappings:
    dynamic_templates:
      - cisco_wsa_keyword_and_text:
          path_match:
            - 'cisco.wsa.app'
            - 'cisco.wsa.*name'
            - 'cisco.wsa.*type'
          match_mapping_type: string
          mapping:
            type: keyword
            ignore_above: 1024
            fields:
              text:
                type: match_only_text
