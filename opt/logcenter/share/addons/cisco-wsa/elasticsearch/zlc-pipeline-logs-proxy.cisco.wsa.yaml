version: 1

on_failure:
  - append: { field: error.message, value: '{{{ _ingest.on_failure_message }}}' }
  - set: { field: event.kind, value: pipeline_error }

processors:
  - set:
      field: _
      value:
        enable_remove_empty_fields: false

  - fail:
      message: 'cisco.wsa.* fields expected'
      if: (ctx.cisco?.wsa instanceof Map) == false

  - script:
      id: zlc-script-ingest-remove-empty-fields
      params:
        empty_string: [ '', '-' ]

  - registered_domain:
      if: 'ctx.url?.domain != null'
      field: url.domain
      target_field: url

  - script:
      lang: painless
      params:
        url_cat_fields:
