          IW_trns: { code: '1044', name: 'Transportation' }
          IW_trvl: { code: '1046', name: 'Travel' }
          IW_tunn: { code: '1122', name: 'DNS-Tuneling' }
          IW_vid: { code: '1072', name: 'Streaming Video' }
          IW_voip: { code: '1067', name: 'Internet Telephony' }
          IW_weap: { code: '1036', name: 'Weapons' }
          IW_whst: { code: '1037', name: 'Web Hosting' }
          IW_xdeu: { code: '1125', name: 'Regional Restricted Sites (Germany)' }
          IW_xgbr: { code: '1123', name: 'Regional Restricted Sites (Great Britain)' }
          IW_xita: { code: '1124', name: 'Regional Restricted Sites (Italy)' }
          IW_xpol: { code: '1126', name: 'Regional Restricted Sites (Poland)' }
      source: |
        // @timestamp
        ctx['@timestamp'] = (long)(ctx['@timestamp'] * 1000);

        // log.lovel
        if (ctx.log?.level instanceof String)
            ctx.log.level = ctx.log.level.toLowerCase();

        // destination.address
        if (ctx.destination?.ip instanceof String)
            ctx.destination.address = ctx.destination.ip;
        else if (ctx.destination?.domain instanceof String)
            ctx.destination.address = ctx.destination.domain;

        // cisco.wsa.acltag
        if (ctx.cisco.wsa.acltag instanceof String) {
            def dash = ctx.cisco.wsa.acltag.indexOf('-');
            if (dash > -1) {
                def pat_ignore = /_[0-9]+$/;
                ctx.cisco.wsa.acltag_decision = ctx.cisco.wsa.acltag.substring(0, dash);
                ctx.cisco.wsa.acltag_decision = pat_ignore.matcher(ctx.cisco.wsa.acltag_decision)
                    .replaceFirst('');
            }
        }

        // url category fields
        for (int i = 0; i < params.url_cat_fields.length; i++) {
            def abbr = ctx.cisco.wsa[params.url_cat_fields[i] + '_code_abbr'];
            if (!(abbr instanceof String))
                continue;
            def spec = params.url_cat_specs[abbr];
            if (spec == null)
                ctx.cisco.wsa[params.url_cat_fields[i] + '_name'] = '('+abbr+')';
            else {
                ctx.cisco.wsa[params.url_cat_fields[i] + '_code'] = spec.code;
                ctx.cisco.wsa[params.url_cat_fields[i] + '_name'] = spec.name+' ('+abbr+')';
            }
        }

  # should already be a number in input JSON
  - convert: { field: http.response.status_code, type: long, ignore_missing: true }
  - convert: { field: http.response.bytes, type: long, ignore_missing: true }
  - convert: { field: cisco.wsa.elapsed_time_ms, type: long, ignore_missing: true }

  # based on sample logs, assume it is always a number
  - convert: { field: cisco.wsa.avg_bw, type: float, ignore_missing: true }
  - convert: { field: cisco.wsa.bw_throttled, type: long, ignore_missing: true }

  # cisco.wsa.wbrs_score may be string "ns" or "dns"
  # cisco.wsa.amp_score is not defined properly in documentation,
  # assume it would be a number
  - convert: { field: cisco.wsa.wbrs_score, target_field: cisco.wsa.wbrs_score_num, type: long, ignore_missing: true, ignore_failure: true }
  - convert: { field: cisco.wsa.amp_score, target_field: cisco.wsa.amp_score_num, type: long, ignore_missing: true, ignore_failure: true }

  # should be 0/1 flags, may be indexed as keywords
  #- convert: { field: cisco.wsa.webroot_scanverdict, type: long, ignore_missing: true }
  #- convert: { field: cisco.wsa.mcafee_scanverdict, type: long, ignore_missing: true }
  #- convert: { field: cisco.wsa.sophos_scanverdict, type: long, ignore_missing: true }
  #- convert: { field: cisco.wsa.icap_verdict, type: long, ignore_missing: true }
  #- convert: { field: cisco.wsa.ids_verdict, type: long, ignore_missing: true }
  #- convert: { field: cisco.wsa.amp_verdict, type: long, ignore_missing: true }
  #- convert: { field: cisco.wsa.amp_upload, type: long, ignore_missing: true }
