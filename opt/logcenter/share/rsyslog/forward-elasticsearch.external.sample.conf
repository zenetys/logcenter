input(
    type="imfile"
    file="/var/log/elasticsearch/*_{audit,deprecation,index_{indexing,search}_slowlog,server}.json"
    readtimeout="5"
    persiststateinterval="100"
    deletestateonfiledelete="on"
    reopenontruncate="on"
    freshstarttail="on"
    tag="elasticsearch"
    severity="notice"
    facility="local0"
)

if ($inputname == "imfile" and $app-name == "elasticsearch") then {
    action(
        name="fwd-external-es"
        type="omfwd"
        protocol="udp"
        target="EXTERNAL_LOG_HOST"
        port="EXTERNAL_LOG_PORT"
        template="RSYSLOG_SyslogProtocol23Format"
        action.resumeretrycount="-1"
        action.resumeinterval="10"
        action.reportsuspension="on"
        action.reportsuspensioncontinuation="on"
        queue.type="LinkedList"
        queue.size="2000"
        queue.timeoutenqueue="0"
    )

    # index locally for kibana monitoring ui
    action(
        name="fwd-idx-es"
        type="omfwd"
        protocol="tcp"
        target="PARSING_HOST"
        port="PARSING_PORT"
        keepalive="on"
        keepalive.interval="10"
        keepalive.probes="3"
        template="RSYSLOG_SyslogProtocol23Format"
        action.resumeretrycount="-1"
        action.resumeinterval="10"
        action.reportsuspension="on"
        action.reportsuspensioncontinuation="on"
        queue.type="LinkedList"
        queue.size="2000"
        queue.timeoutenqueue="0"
        queue.maxfilesize="5m"
        queue.maxdiskspace="20m"
        queue.saveonshutdown="on"
        queue.filename="fwd-es-index"
    )
    stop
}
