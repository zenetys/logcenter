log-forward ft_name
    bind ${BIND_ADDRESS} tcp-ut 7s
    log backend@bk_name local0

backend bk_name
    mode log
    balance roundrobin
    default-server check inter 3000 rise 2 fall 1 log-bufsize 10485760 log-proto octet-count
    server s1 ${SERVER_ADDRESS_01}
    server s2 ${SERVER_ADDRESS_02}
