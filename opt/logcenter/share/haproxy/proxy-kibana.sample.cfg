frontend ft_kibana
    mode http
    option httpslog
    option forwardfor except 127.0.0.0/8
    bind ${KIBANA_ADDRESS} ssl crt ${KIBANA_PEM}
    default_backend bk_kibana

backend bk_kibana
    mode http
    balance roundrobin
    option httpchk
    http-check send meth HEAD uri /api/status
    http-check expect status 200
    cookie ZLC_KBN_PERSIST insert indirect nocache
    default-server ssl ca-file /etc/logcenter/certs/ca.crt check inter 3000 rise 2 fall 1
    server ${KIBANA_SERVER_01_NAME} ${KIBANA_SERVER_01_ADDRESS} cookie s1
    server ${KIBANA_SERVER_02_NAME} ${KIBANA_SERVER_02_ADDRESS} cookie s2
