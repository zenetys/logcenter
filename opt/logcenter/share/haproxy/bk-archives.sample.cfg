backend bk_archives
    mode http
    balance roundrobin
    option httpchk
    http-check send meth HEAD uri /archives/ hdr user-agent haproxy-check
    http-check expect status 200
    cookie ZLC_WUI_PERSIST insert indirect nocache

    default-server ssl ca-file /etc/logcenter/certs/ca.crt check inter 3000 rise 2 fall 1
    server ${ARCHIVES_SERVER_01_NAME} ${ARCHIVES_SERVER_01_ADDRESS} cookie s1
    server ${ARCHIVES_SERVER_02_NAME} ${ARCHIVES_SERVER_02_ADDRESS} cookie s2
