frontend ft_elastic_ingest
    mode http
    option httpslog
    option forwardfor except 127.0.0.0/8
    bind ${ELASTIC_INGEST_ADDRESS} ssl crt ${ELASTIC_INGEST_PEM}
    default_backend bk_elastic

frontend ft_elastic_query
    mode http
    option httpslog
    option forwardfor except 127.0.0.0/8
    bind ${ELASTIC_QUERY_ADDRESS} ssl crt ${ELASTIC_QUERY_PEM}
    default_backend bk_elastic

backend bk_elastic
    mode http
    balance roundrobin
    default-server ssl ca-file /etc/logcenter/certs/ca.crt check inter 3000 rise 2 fall 1
    server ${ELASTIC_SERVER_01_NAME} ${ELASTIC_SERVER_01_ADDRESS}
    server ${ELASTIC_SERVER_02_NAME} ${ELASTIC_SERVER_02_ADDRESS}
