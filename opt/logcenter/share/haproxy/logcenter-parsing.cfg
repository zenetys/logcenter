log-forward ft_syslog_parsing
    bind 0.0.0.0:35140 tcp-ut 7s
    log backend@bk_syslog_parsing local0

backend bk_syslog_parsing
    mode log
    balance roundrobin
    default-server check inter 3000 rise 2 fall 1 log-bufsize 10485760 log-proto octet-count
    server srv_rsyslog_parsing_01 "$SRV_RSYSLOG_PARSING_01"
    server srv_rsyslog_parsing_02 "$SRV_RSYSLOG_PARSING_02"
