policy:
  phases:
    hot:
      min_age: 0ms
      actions:
        rollover:
          max_age: 1d
          max_primary_shard_size: 1gb
    warm:
      min_age: 0ms
      actions:
        forcemerge:
          max_num_segments: 1
    delete:
      min_age: 2d
      actions:
        delete:
          delete_searchable_snapshot: true
