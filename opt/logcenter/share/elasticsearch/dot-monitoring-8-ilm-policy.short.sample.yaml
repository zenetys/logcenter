policy:
  phases:
    hot:
      min_age: 0ms
      actions:
        rollover:
          max_age: 12h
          max_primary_shard_size: 512mb
    warm:
      min_age: 0ms
      actions:
        forcemerge:
          max_num_segments: 1
    delete:
      min_age: 12h
      actions:
        delete:
          delete_searchable_snapshot: true
