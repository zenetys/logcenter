input(
    type="imuxsock"
    config.enabled=`echo $ZLC_LISTEN_UXSOCK`
    socket=`echo $ZLC_LISTEN_UXSOCK_SOCKET`
    name="local-uxsock"
)

input(
    type="imudp"
    config.enabled=`echo $ZLC_LISTEN_UDP`
    address=`echo $ZLC_LISTEN_UDP_ADDRESS`
    port=`echo $ZLC_LISTEN_UDP_PORT`
    name="net-udp"
    rcvbufsize="16777216"
)

input(
    type="imtcp"
    config.enabled=`echo $ZLC_LISTEN_TCP`
    address=`echo $ZLC_LISTEN_TCP_ADDRESS`
    port=`echo $ZLC_LISTEN_TCP_PORT`
    name="net-tcp"
    keepalive="on"
    keepalive.time="30"
    keepalive.interval="30"
    keepalive.probes="6"
)

input(
    type="imrelp"
    config.enabled=`echo $ZLC_LISTEN_RELP`
    address=`echo $ZLC_LISTEN_RELP_ADDRESS`
    port=`echo $ZLC_LISTEN_RELP_PORT`
    name="net-relp"
    keepalive="on"
    keepalive.time="30"
    keepalive.interval="30"
    keepalive.probes="6"

    tls=`echo $ZLC_LISTEN_RELP_TLS`
    tls.mycert=`echo $ZLC_LISTEN_RELP_TLS_CERT`
    tls.myprivkey=`echo $ZLC_LISTEN_RELP_TLS_KEY`
    tls.cacert=`echo $ZLC_LISTEN_RELP_TLS_CACERT`
)

input(
    type="imtcp"
    config.enabled=`echo $ZLC_LISTEN_PARSING`
    address=`echo $ZLC_LISTEN_PARSING_ADDRESS`
    port=`echo $ZLC_LISTEN_PARSING_PORT`
    name="parsing"
    keepalive="on"
    keepalive.time="30"
    keepalive.interval="30"
    keepalive.probes="6"
    ruleset="ruleset-parsing"
)
