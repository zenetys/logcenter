# IMPORTANT:
# After this file, we should work with $. counterparts of vanilla rsyslog
# properties, eg: $.app-name instead of $app-name, etc.

include(file=`echo $ZLC_CONFIG_DIR_LOCAL/logs-post.d/*.conf` mode="optional")

# make that bloc a ruleset so it is callable from the parsing ruleset as well
ruleset(name="ruleset-dot-properties") {
    if ($.hostname == "") then
        set $.hostname = $hostname;
    if ($.fromhost-ip == ["","127.0.0.1","::1"]) then
        set $.fromhost-ip = $fromhost-ip;
    if ($.fromhost == "") then
        set $.fromhost = $fromhost;
    if ($.app-name == "") then
        set $.app-name = $app-name;
    if ($.procid == "") then
        set $.procid = $procid;

    # Use these in parsers for the $!@timestamp property if needed.
    if ($.timegenerated-rfc3339 == "") then
        set $.timegenerated-rfc3339 = exec_template("template-timegenerated");
    if ($.timereported-rfc3339 == "") then
        set $.timereported-rfc3339 = exec_template("template-timereported");
    
    if ($.msg == "") then
        set $.msg = $msg;
    if ($protocol-version == 0 and $.log_fixed != 1 and $.msg startswith " ") then
        set $.msg = substring($.msg, 1, -1);

    if ($.structured-data == "") then
        set $.structured-data = $structured-data;
}

call ruleset-dot-properties

if ($.structured-data != "-") then
    set $.structured-data-or-empty = $.structured-data;

action(
    config.enabled=`echo $ZLC_DEBUG_LOGS`
    type="omfile"
    name="debug-logs"
    file=`echo $ZLC_LOG_DIR/logs.debug`
    template="RSYSLOG_DebugFormat"
)
