include(file=`echo $ZLC_CONFIG_DIR_LOCAL/parsing-pre.d/[a-z]*.conf` mode="optional")
include(file=`echo $ZLC_CONFIG_DIR_LOCAL/parsing.d/[a-z]*.conf` mode="optional")
include(file=`echo $ZLC_CONFIG_DIR_SYSTEM/parsing.d/[a-z]*.conf` mode="optional")
include(file=`echo $ZLC_CONFIG_DIR_LOCAL/parsing-post.d/[a-z]*.conf` mode="optional")

template(name="template-dyn-es-index" type="list") {
    property(name="$.es_index")
}

template(name="template-dyn-es-pipeline" type="list") {
    property(name="$.es_pipeline")
}

template(name="template-format-elastic" type="list") {
    property(name="$!")
    constant(value="\n")
}

template (name="template-format-debug-parsing" type="list") {
    constant(value="{\"$.\":")
    property(name="$.")
    constant(value=",\"$!\":")
    property(name="$!")
    constant(value="}\n")
}

ruleset(
    name="ruleset-parsing"
    queue.type="LinkedList"
    queue.size="40000"
    queue.timeoutenqueue="0"
    queue.dequeuebatchsize="200"
    queue.workerthreads="4"
    queue.workerthreadminimummessages="7000"
) {
    action(type="mmutf8fix" name="parsing-utf8fix" mode="utf-8" replacementchar=".")

    if ($inputname == "parsing") then {
        call ruleset-sd-zlc
        call ruleset-dot-properties
    }
    if ($.client_id != "") then
        set $!zlc.client_id = $.client_id;
    if ($.relay_path != "") then
        set $!zlc.relay_path = $.relay_path;

    include(file=`echo $ZLC_CONFIG_DIR_LOCAL/parsing-pre.d/[0-9]*.conf` mode="optional")
    include(file=`echo $ZLC_CONFIG_DIR_LOCAL/parsing.d/[0-9]*.conf` mode="optional")
    include(file=`echo $ZLC_CONFIG_DIR_SYSTEM/parsing.d/[0-9]*.conf` mode="optional"
        config.enabled=`echo $ZLC_PARSING_LOAD_ALL_PARSERS`)
    include(file=`echo $ZLC_CONFIG_DIR_LOCAL/parsing-post.d/[0-9]*.conf` mode="optional")

    if ($!data_stream.dataset == "") then {
        action(
            config.enabled=`echo $ZLC_DEBUG_PARSING`
            type="omfile"
            name="debug-parsing-no-index"
            file=`echo $ZLC_LOG_DIR/parsing-no-index.debug`
            template="template-format-debug-parsing"
        )
        stop
    }

    if ($!data_stream.type == "") then
        set $!data_stream.type = "logs";
    if ($!data_stream.namespace == "") then
        set $!data_stream.namespace = `echo $ZLC_ELASTIC_NAMESPACE`;

    if ($.rj_id != "") then
        set $!data_stream.namespace = $!data_stream.namespace & "." & $.rj_id;

    # use $.es_index as elastic target index/data_stream, it is easier to handle
    # cases when unflatten is enabled or not
    set $.es_index = $!data_stream.type & "-" &
                     $!data_stream.dataset & "-" &
                     $!data_stream.namespace;

    if ($!@timestamp == "") then
        set $!@timestamp = $.timegenerated-rfc3339;
    if ($!host.name == "") then {
        # try to use a name as much as possible, ptr or syslog field
        if (`echo $ZLC_USE_DNS` != "on" or $.fromhost-ip == $.fromhost) then
            set $!host.name = $.hostname;
        else
            set $!host.name = $.fromhost;
    }
    if ($!host.ip == "") then
        set $!host.ip = $.fromhost-ip;

    # remove garbage
    unset $!event.tags;
    unset $!originalmsg;
    unset $!unparsed-data;

    # unflatten - From this point, dot expansion has been done on keys in $! (only
    # if the module is enable). For some reason original keys are not removed with
    # $! = unflatten($!, 46), even with reset instead of set, like an append; it
    # seems to be rsyslog expected behavior...
    include(config.enabled=`echo $ZLC_PARSING_UNFLATTEN` text="
        if (exists($!)) then {
            set $.unflatten = unflatten($!, 46);
            unset $!;
            set $! = $.unflatten;
            unset $.unflatten;
        }
    ")

    action(
        config.enabled=`echo $ZLC_DEBUG_PARSING`
        type="omfile"
        name="debug-parsing"
        file=`echo $ZLC_LOG_DIR/parsing.debug`
        template="template-format-debug-parsing"
    )

    include(file=`echo $ZLC_CONFIG_DIR_LOCAL/index-pre.d/[0-9]*.conf` mode="optional")
    include(file=`echo $ZLC_CONFIG_DIR_LOCAL/index.d/[0-9]*.conf` mode="optional")

    action(
        config.enabled=`echo $ZLC_ELASTIC`
        type="omelasticsearch"
        name="out-elastic"
        server=`echo $ZLC_ELASTIC_URL`
        tls.cacert=`echo $ZLC_ELASTIC_CACERT`
        allowunsignedcerts=`echo $ZLC_ELASTIC_INSECURE`
        skipverifyhost=`echo $ZLC_ELASTIC_INSECURE`
        uid=`echo $ZLC_ELASTIC_UID`
        pwd=`echo $ZLC_ELASTIC_PWD`
        dynsearchindex="on"
        searchindex="template-dyn-es-index"
        dynpipelinename="on"
        pipelinename="template-dyn-es-pipeline"
        skippipelineifempty="on"
        template="template-format-elastic"
        bulkmode="on"
        writeoperation="create"
        maxbytes="100m"
        errorfile=`echo $ZLC_LOG_DIR/es-errors.log`
        esversion.major="8"

        queue.type="LinkedList"
        queue.size="30000"
        queue.timeoutenqueue="5000"
        queue.dequeuebatchsize="8000"
        queue.workerthreads="4"
        queue.workerthreadminimummessages="7000"

        action.resumeretrycount="-1"
        action.resumeinterval="5"
        action.resumeintervalmax="5"
        action.reportsuspension="on"
        action.reportsuspensioncontinuation="on"

        # disk assisted queue
        queue.maxfilesize="25m"
        queue.maxdiskspace="500m"
        queue.saveonshutdown="on"
        queue.filename="out-elastic"
    )

    include(file=`echo $ZLC_CONFIG_DIR_LOCAL/index-post.d/[0-9]*.conf` mode="optional")
}

if ($.skip_parsing != 1) then {
    if (`echo $ZLC_PARSING_HOST` != "") then {
        action(
            name="log-fwd-parsing"
            type="omfwd"
            protocol="tcp"
            target=`echo $ZLC_PARSING_HOST`
            port=`echo $ZLC_PARSING_PORT`
            tcp_framing="octet-counted"
            keepalive="on"
            keepalive.interval="10"
            keepalive.probes="3"
            template="template-forward-rfc5424-sd-zlc"

            # In case the HAProxy frontend switches to a backup
            # server, this allow to re-establish a connection
            # on the primary. Unit is in messages sent.
            rebindinterval="100000"

            action.resumeretrycount="-1"
            action.resumeinterval="5"
            action.resumeintervalmax="5"
            action.reportsuspension="on"
            action.reportsuspensioncontinuation="on"

            queue.type="LinkedList"
            queue.size="40000"
            queue.timeoutenqueue="5000"
            queue.dequeuebatchsize="8000"
            queue.workerthreads="2"
            queue.workerthreadminimummessages="7000"

            # disk assisted queue
            #queue.maxfilesize="25m"
            #queue.maxdiskspace="1g"
            #queue.saveonshutdown="on"
            #queue.filename="log-fwd-parsing"
        )
    }
    else if (`echo $ZLC_PARSING` == "on") then
        call ruleset-parsing
}
