# local pstats go to a dedicated file to avoid polluting system log files
if ($inputname == "impstats") then {
    action(
        type="omfile"
        file="/var/log/logcenter/pstats.log"
        template="RSYSLOG_FileFormat"
        name="out-pstats"
        queue.type="LinkedList"
        queue.size="1000"
        queue.timeoutenqueue="0"
    )
    stop
}
