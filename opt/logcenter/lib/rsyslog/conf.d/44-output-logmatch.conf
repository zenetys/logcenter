template (name="template-logmatch-format" type="list") {
    property(name="$.timegenerated-rfc3339")
    constant(value="\t")
    property(name="$.timereported-rfc3339")
    constant(value="\t")
    property(name="syslogfacility-text")
    constant(value="\t")
    property(name="syslogseverity-text")
    constant(value="\t")
    property(name="$.hostname")
    constant(value="\t")
    property(name="$.fromhost-ip")
    constant(value="\t")
    property(name="$.app-name")
    constant(value="\t")
    property(name="$.msg" controlcharacters="escape" droplastlf="on")
    constant(value="\n")
}

if ($.skip_logmatch != 1) then {
    action(
        config.enabled=`echo $ZLC_LOGMATCH`
        type="omprog"
        name="out-logmatch"
        template="template-logmatch-format"
        binary=`echo /opt/kompot/bin/logmatch -b -v CONFIG=$ZLC_LOGMATCH_CONFIG -v ALIASES=$ZLC_LOGMATCH_ALIASES -v NAGIOS_EXTERNAL_COMMAND_FILE=$ZLC_LOGMATCH_NAGIOS_EXTERNAL_COMMAND_FILE -v DEBUG=1`
        confirmmessages="on"
        confirmtimeout="1000"
        reportfailures="on"
        queue.type="LinkedList"
        queue.saveonshutdown="on"
        queue.workerthreads="5"
        action.resumeinterval="5"
        action.resumeintervalmax="5"
        killunresponsive="on"
        output=`echo $ZLC_LOG_DIR/logmatch.log`
    )
}
