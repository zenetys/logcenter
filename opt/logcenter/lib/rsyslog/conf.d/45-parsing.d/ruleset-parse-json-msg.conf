# Use "call ruleset-parse-json-msg" as if it was a function or a subroutine.
# To avoid multiple decoding, check for $.json_msg!result value before.
#
# Norms for decoding of JSON $.msg:
# - decoded data goes into $.json_msg!data
# - decode result goes into $.json_msg!result
#     1: decode (already) done and success
#     2: decode (already) tried and failed

ruleset(name="ruleset-parse-json-msg") {
    if (parse_json($.msg, "\$.json_msg!data") == 0) then
        set $.json_msg!result = 1;
    else
        set $.json_msg!result = 2;
}
