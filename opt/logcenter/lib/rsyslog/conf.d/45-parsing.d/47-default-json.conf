if ($.parsing_done != 1 and
    $.msg startswith "{" and
    $.json_msg!result != 2) then {

    if ($.json_msg!result != 1) then
        call ruleset-parse-json-msg

    if ($.json_msg!result == 1) then {
        set $!json = $.json_msg!data;

        set $!data_stream.dataset = "json";
        set $.parsing_done = 1;
    }
}
