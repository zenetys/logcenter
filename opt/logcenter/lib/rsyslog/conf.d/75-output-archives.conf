template(name="template-archives-file" type="list") {
    constant(value=`echo $ZLC_OUTPUT_ARCHIVES_DIR`)
    constant(value="/")
    property(name="$.archives_path_src" securepath="replace")
    constant(value="/syslog/")
    property(name="timegenerated" dateformat="year")
    constant(value="-")
    property(name="timegenerated" dateformat="month")
    constant(value="-")
    property(name="timegenerated" dateformat="day")
    constant(value=`echo $ZLC_SELF_ID_EXT`)
    constant(value=".log")
}

# Compromise to produce a better human-readable single line archive
# with a decent logic to parse back the line in case elasticsearch
# reinject is needed. There are two formats possible:
#
# - (1) The field after <msgid> is "-", there is no structured-data; this
#   should cover most cases:
#       ... <msgid> - <msg>
#
# - (2) The field after <msgid> is a JSON object, that was encoded either
#   because there is structured-data or because the message is multiline:
#       ... <msgid> {"sd":<structured-data>, "msg":<message-maybe-multilines>}
#       ... <msgid> {"msg":<message-with-multilines>}
#
# Note: control chars are not escaped in variant (1) to keep the message
# as-received as much as possible.

template (name="template-format-archives" type="list") {
    property(name="$.timegenerated-rfc3339")
    constant(value="/")
    property(name="$.timereported-rfc3339")
    constant(value=" ")
    property(name="syslogfacility-text")
    constant(value=".")
    property(name="syslogseverity-text")
    constant(value=" ")
    property(name="$.hostname")
    constant(value="/")
    property(name="$.fromhost-ip")
    constant(value=" ")
    property(name="$.app-name")
    constant(value=" ")
    property(name="$.procid")
    constant(value=" ")
    property(name="msgid")
    property(name="$.archives_sd_msg" spifno1stsp="on")
    property(name="$.archives_sd_msg" droplastlf="on")
    constant(value="\n")
}

template (name="template-archives-json-sd-msg" type="list" option.jsonf="on") {
    property(name="$.structured-data-or-empty" format="jsonf" outname="sd" datatype="string" onempty="skip")
    property(name="$.msg" format="jsonf" outname="msg" datatype="string" droplastlf="on")
}

if (`echo $ZLC_OUTPUT_ARCHIVES` == "on" and $.skip_archives != 1) then {
    # Construct SD/msg in one the two formats as described in comments above.
    if ($.structured-data-or-empty != "" or $.msg contains "\n") then
        set $.archives_sd_msg = exec_template("template-archives-json-sd-msg");
    else
        set $.archives_sd_msg = "- " & $.msg;

    # Use $.fromhost insead of $.fromhost-ip in archives path if DNS is
    # enabled. The following was observed:
    # - when net.enabledns is on, fromhost contains the PTR name of fromhost-ip
    #   if inverse resolution suceeded, otherwise it is the same as fromhost-ip
    # - we found a case where fromhost is always a name, even if net.enabledns
    #   is off: with messages comming from imjournal
    if (`echo $ZLC_USE_DNS` == "on") then
        set $.archives_path_src = $.fromhost;
    else
        set $.archives_path_src = $.fromhost-ip;

    # Store in $ZLC_OUTPUT_ARCHIVES_DIR/<srcip>/<yyyy-mm-dd>.log
    action(
        config.enabled=`echo $ZLC_OUTPUT_ARCHIVES`
        type="omfile"
        dynafile="template-archives-file"
        template="template-format-archives"
        name="out-archives"
        dynafilecachesize="500"
        dircreatemode="0750"
        dirowner=`echo $ZLC_OUTPUT_ARCHIVES_USER`
        dirgroup=`echo $ZLC_OUTPUT_ARCHIVES_GROUP`
        filecreatemode="0640"
        fileowner=`echo $ZLC_OUTPUT_ARCHIVES_USER`
        filegroup=`echo $ZLC_OUTPUT_ARCHIVES_GROUP`

        action.resumeretrycount="-1"
        action.resumeinterval="5"
        action.resumeintervalmax="5"
        action.reportsuspension="on"
        action.reportsuspensioncontinuation="on"

        queue.type="LinkedList"
        queue.size="10000"
        queue.timeoutenqueue="5000"
    )
}
