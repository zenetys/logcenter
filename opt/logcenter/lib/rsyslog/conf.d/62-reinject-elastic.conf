template(name="template-reinject-dyn-es-index" type="list") {
    property(name="$.es_index")
    constant(value=".")
    property(name="$.rj_id")
}

template(name="template-reinject-dyn-es-pipeline" type="list") {
    property(name="$.es_pipeline")
}

template(name="template-reinject-format-elastic" type="list") {
    property(name="$!")
    constant(value="\n")
}

ruleset(
    name="ruleset-reinject-elastic"

    queue.type="LinkedList"
    queue.size="40000"
    queue.timeoutenqueue="0"
    queue.dequeuebatchsize="200"
    queue.workerthreads="2"
    queue.workerthreadminimummessages="10000"
) {
    action(
        config.enabled=`echo $ZLC_OUTPUT_ELASTIC_REINJECT`
        type="omelasticsearch"
        name="out-reinject-elastic"
        server=`echo $ZLC_OUTPUT_ELASTIC_REINJECT_SERVER`
        tls.cacert=`echo $ZLC_OUTPUT_ELASTIC_CACERT`
        allowunsignedcerts=`echo $ZLC_OUTPUT_ELASTIC_INSECURE`
        skipverifyhost=`echo $ZLC_OUTPUT_ELASTIC_INSECURE`
        uid=`echo $ZLC_OUTPUT_ELASTIC_UID`
        pwd=`echo $ZLC_OUTPUT_ELASTIC_PWD`
        dynsearchindex="on"
        searchindex="template-reinject-dyn-es-index"
        dynpipelinename="on"
        pipelinename="template-reinject-dyn-es-pipeline"
        skippipelineifempty="on"
        template="template-reinject-format-elastic"
        bulkmode="on"
        writeoperation="create"
        maxbytes="100m"
        errorfile=`echo $ZLC_LOG_DIR/es-errors.reinject.log`
        esversion.major="8"

        queue.type="LinkedList"
        queue.size="30000"
        queue.timeoutenqueue="15000"
        queue.dequeuebatchsize="8000"
        queue.workerthreads="2"
        queue.workerthreadminimummessages="7000"

        action.resumeretrycount="-1"
        action.resumeinterval="5"
        action.resumeintervalmax="5"
        action.reportsuspension="on"
        action.reportsuspensioncontinuation="on"
    )
}

if ($.rj_id != "" and $.es_index != "") then {
    call ruleset-reinject-elastic
    stop
}
