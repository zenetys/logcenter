# IMPORTANT:
# If modifying vanilla properties like $app-name, $procid, $msg, ... is needed,
# do it in their $. counterparts ($.app-name, $.procid, $.msg, ...).
# To make an "empty" value use "-".

if ($protocol-version == 0 and
    $inputname startswith "net-") then {

    # Cases for most likely wrong rfc3164 parsing.
    if ($app-name == "-" and $syslogtag != ["","[]","[]:"]) then {
        set $.msg = $syslogtag & $msg;
        set $.log_fixed = 1;
    }
    # CEF logs, ex: Forcepoint CEF, Fortinet CEF: no tag field
    # The CEF header begins with CEF:0|...
    # Rsyslog parses app-name as CEF and msg as 0|..., so move tag to msg.
    else if ($app-name == "CEF" and $syslogtag == "CEF:" and $msg startswith "0|") then {
        set $.msg = $syslogtag & $msg;
        set $.app-name = "-";
        set $.log_fixed = 1;
    }
    else {
        # F5 Big-IP logs are a mess, severity as text is put in the tag field:
        # <134>Apr 16 14:19:40 f5lan1 info tmm3[19341]: Rule /Common/...
        # <31>Apr 16 14:19:48 f5lan2 debug snmpd[8173]: truncating integer value > 32 bits
        # <133>Apr 16 14:19:36 f5mgr1 notice tmsh[2381]: 01340009:1: AUDIT - pid=...
        # <142>Apr 16 16:34:28 f5mgr1 info apmd[13221]: 01320002:3: /ABC...
        #
        # But there are some exceptions:
        # <13>Apr 16 14:27:27 f5mgr1 Sample Support IDs were set to 1234531234560123456. { audit: ...
        # <13>Apr 16 14:49:02 f5mgr1 g,DC=p         # truncated? bug?
        # <13>Apr 16 14:49:02 f5mgr1 afimus         # truncated? bug?
        # Note: <13> is facility = 1 (user), severity = 5 (notice), the default as per RFC 3164
        if ($.log_type == "f5") then {
            if ($syslogseverity-text == $app-name) then {
                action(
                    type="mmnormalize"
                    name="norm-fix-f5-tag"
                    rulebase=`echo $LIBLOGNORM_RULEBASES/fix-f5-tag.rb`
                    variable="msg"
                    path="$."
                )
                if ($parsesuccess == "OK") then {
                    if ($.event.tags contains "noprocid") then set $.procid = "-";
                    if ($.event.tags contains "noappname") then set $.app-name = "-";
                }
                else {
                    set $.app-name = "-";
                    set $.procid = "-";
                }
            }
            else if ($syslogtag == "Sample" and $msg startswith " Support") then {
                set $.app-name = "-";
                set $.procid = "-";
                set $.msg = $syslogtag & $msg;
            }
            else if ($pri == 13 and ((strlen($hostname) + strlen($app-name) +
                                        strlen($msg)) < 38 or $msg == "")) then {
                # most likely truncated or bug
                set $.app-name = "-";
                set $.procid = "-";
                set $.msg = $syslogtag & $msg;
            }
            set $.log_fixed = 1;
        }

        # AIX with "Message forwarded from <hostname>: " prefix
        if ($.log_fixed != 1 and $hostname == "Message" and $app-name == "forwarded") then {
            action(
                type="mmnormalize"
                name="norm-fix-aix-forwarded"
                rulebase=`echo $LIBLOGNORM_RULEBASES/fix-aix-forwarded.rb`
                variable="rawmsg"
                path="$."
            )
            if ($parsesuccess == "OK") then {
                if ($.event.tags contains "noprocid") then set $.procid = "-";
                if ($.event.tags contains "noappname") then set $.app-name = "-";
                # app-name may contain spaces, eg: Oracle Audit
                else set $.app-name = replace($.app-name, " ", "_");
                set $.log_fixed = 1;
            }
        }

        # Cisco IOS logs have various possibilities of fields before the %tag: message,
        # ex: syslog count, origin-id, sequence number, date (and format), timezone
        # presence (and format). Best is to keep the raw message after <pri> as $.msg.
        # Note: without counters nor origin-id, rsyslog may parse the reported date
        # and it may not be parsed correctly, ex: timezone presence, timezone format.
        if ($.log_fixed != 1) then {
            if ($.log_type == "" and substring($rawmsg, 0, 255) contains ": %") then {
                unset $.norm;
                action(
                    type="mmnormalize"
                    name="norm-fix-cisco-iosnx-tag"
                    rulebase="cisco-iosnx-tag.rb"
                    variable="rawmsg"
                    path="$.norm"
                )
                if ($parsesuccess == "OK") then
                    set $.log_type = "cisco-iosnx";
            }
            if ($.log_type == "cisco-iosnx") then {
                set $.hostname = $fromhost-ip;
                set $.app-name = "-";
                set $.procid = "-";
                set $.msg = $rawmsg-after-pri;
                set $.log_fixed = 1;
            }
        }

        # No date field, no hostname field, no tag field.
        # Use everything after <PRI> as the message.
        if ($.log_fixed != 1) then {
            unset $.norm;
            action(
                type="mmnormalize"
                name="norm-fix-syslog-no-date-hostname-tag"
                rulebase=`echo $LIBLOGNORM_RULEBASES/fix-syslog-no-date-hostname-tag.rb`
                variable="rawmsg"
                path="$.norm"
            )
            if ($parsesuccess == "OK") then {
                set $.hostname = $fromhost-ip;
                set $.app-name = "-";
                set $.procid = "-";
                set $.msg = $rawmsg-after-pri;
                set $.log_fixed = 1;
            }
        }

        # No hostname field, no tag field.
        # Use everything after date as the message.
        if ($.log_fixed != 1) then {
            unset $.norm;
            action(
                type="mmnormalize"
                name="norm-fix-syslog-no-hostname-tag"
                rulebase=`echo $LIBLOGNORM_RULEBASES/fix-syslog-no-hostname-tag.rb`
                variable="rawmsg"
                path="$.norm"
            )
            if ($parsesuccess == "OK") then {
                set $.hostname = $fromhost-ip;
                set $.app-name = "-";
                set $.procid = "-";
                set $.norm!date_len = strlen($.norm!date) + 1; # trailing space
                set $.msg = substring($rawmsg-after-pri, $.norm!date_len,
                    strlen($rawmsg-after-pri) - $.norm!date_len);
                set $.log_fixed = 1;
            }
        }

        # No tag field.
        # Move tag at the beginning of the message.
        if ($.log_fixed != 1) then {
            unset $.norm;
            action(
                type="mmnormalize"
                name="norm-fix-syslog-no-tag"
                rulebase=`echo $LIBLOGNORM_RULEBASES/fix-syslog-no-tag.rb`
                variable="rawmsg"
                path="$.norm"
            )
            if ($parsesuccess == "OK") then {
                set $.msg = $syslogtag & $msg;
                set $.app-name = "-";
                set $.log_fixed = 1;
            }
        }

        # Aruba AP logs are a mess: no tag field (for some logs)
        # <142>Dec  6 23:04:36 2023 10.109.21.206 <10.109.21.206 C8:A5:DA:E3:21:87> snmp[5403]: ...
        # <142>Dec  6 23:04:36 2023 10.109.21.206 <10.109.21.206 C8:A5:DA:E3:21:87> dnsmasq[10711]: ...
        # Move the <IP MAC> part at the begining of the message.
        if ($.log_fixed != 1 and $app-name startswith "<") then {
            unset $.norm;
            action(
                type="mmnormalize"
                name="norm-fix-aruba-ap"
                rulebase=`echo $LIBLOGNORM_RULEBASES/fix-aruba-ap.rb`
                variable="rawmsg"
                path="$.norm"
            )
            if ($parsesuccess == "OK") then {
                set $.app-name = $.norm!app-name;
                set $.procid = $.norm!procid;
                set $.msg = "<" &  $.norm!before-tag!ip & " " & $.norm!before-tag!mac & ">  " & $.norm!msg;
                set $.log_fixed = 1;
            }
        }
    } # end else
} # end if ($protocol-version == 0)
