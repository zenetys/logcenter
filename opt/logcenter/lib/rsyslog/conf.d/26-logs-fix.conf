# IMPORTANT:
# If modifying vanilla properties like $app-name, $procid, $msg, ... is needed,
# do it in there $. counterparts ($.app-name, $.procid, $.msg, ...). To make
# an "empty" value use "-".

if ($protocol-version == 0 and
    $inputname startswith "net-") then {

    # Fortigate logs, default format
    # Note: CSV format is probably similar with commas instead of spaces
    # between fields.
    if ($.log_fixed != 1) then {
        # <189>logver=604081234 timestamp=1694092511 devname="FW-FORTINET" devid="ABC12ABC1234A12A" ...
        # <189>date=2023-09-01 time=22:51:48 devname="FW-FORTINET" devid="AB123ABC12345678" ...
        # Use everything after <PRI> as the message.
        unset $.norm;
        action(
            type="mmnormalize"
            name="norm-fix-fortinet"
            rulebase=`echo $LIBLOGNORM_RULEBASES/fix-fortinet.rb`
            variable="rawmsg"
            path="$.norm"
        )
        if ($parsesuccess == "OK") then {
            set $.app-name = "-";
            set $.procid = "-";
            set $.msg = $rawmsg-after-pri;
            set $.log_fixed = 1;
        }
    }

    # Aruba AP logs are a mess
    if ($.log_fixed != 1 and $app-name startswith "<") then {
        # <142>Dec  6 23:04:36 2023 10.109.21.206 <10.109.21.206 C8:A5:DA:E3:21:87> snmp[5403]: ...
        # <142>Dec  6 23:04:36 2023 10.109.21.206 <10.109.21.206 C8:A5:DA:E3:21:87> dnsmasq[10711]: ...
        # Move the <IP MAC> part at the begining of the message.
        unset $.norm;
        action(
            type="mmnormalize"
            name="norm-fix-aruba-ap"
            rulebase=`echo $LIBLOGNORM_RULEBASES/fix-aruba-ap.rb`
            variable="rawmsg"
            path="$.norm"
        )
        if ($parsesuccess == "OK") then {
            set $.app-name = $.norm!app-name;
            set $.procid = $.norm!procid;
            set $.msg = "<" &  $.norm!before-tag!ip & " " & $.norm!before-tag!mac & ">  " & $.norm!msg;
            set $.log_fixed = 1;
        }
    }
}
