# IMPORTANT:
# If modifying vanilla properties like $app-name, $procid, $msg, ... is needed,
# do it in their $. counterparts ($.app-name, $.procid, $.msg, ...).
# To make an "empty" value use "-".

if ($protocol-version == 0 and
    $inputname startswith "net-") then {

    # Cases for most likely wrong rfc3164 parsing.
    if ($app-name == "-" and $syslogtag != ["","[]","[]:"]) then {
        set $.msg = $syslogtag & $msg;
        set $.log_fixed = 1;
    }
    # CEF logs, ex: Forcepoint CEF, Fortinet CEF: no tag field
    # The CEF header begins with CEF:0|...
    # Rsyslog parses app-name as CEF and msg as 0|..., so move tag to msg.
    else if ($app-name == "CEF" and $syslogtag == "CEF:" and $msg startswith "0|") then {
        set $.msg = $syslogtag & $msg;
        set $.app-name = "-";
        set $.log_fixed = 1;
    }
    else {
        # AIX with "Message forwarded from <hostname>: " prefix
        if ($hostname == "Message" and $app-name == "forwarded") then {
            action(
                type="mmnormalize"
                name="norm-fix-aix-forwarded"
                rulebase=`echo $LIBLOGNORM_RULEBASES/fix-aix-forwarded.rb`
                variable="rawmsg"
                path="$."
            )
            if ($parsesuccess == "OK") then {
                if ($.event.tags contains "noprocid") then set $.procid = "-";
                if ($.event.tags contains "noappname") then set $.app-name = "-";
                # app-name may contain spaces, eg: Oracle Audit
                else set $.app-name = replace($.app-name, " ", "_");
                set $.log_fixed = 1;
            }
        }

        # No hostname field, no tag field.
        # Use everything after <PRI> as the message.
        if ($.log_fixed != 1) then {
            unset $.norm;
            action(
                type="mmnormalize"
                name="norm-fix-syslog-no-hostname-tag"
                rulebase=`echo $LIBLOGNORM_RULEBASES/fix-syslog-no-hostname-tag.rb`
                variable="rawmsg"
                path="$.norm"
            )
            if ($parsesuccess == "OK") then {
                set $.app-name = "-";
                set $.procid = "-";
                set $.msg = $rawmsg-after-pri;
                set $.log_fixed = 1;
            }
        }

        # No tag field.
        # Move tag at the beginning of the message.
        if ($.log_fixed != 1) then {
            unset $.norm;
            action(
                type="mmnormalize"
                name="norm-fix-syslog-no-tag"
                rulebase=`echo $LIBLOGNORM_RULEBASES/fix-syslog-no-tag.rb`
                variable="rawmsg"
                path="$.norm"
            )
            if ($parsesuccess == "OK") then {
                set $.msg = $syslogtag & $msg;
                set $.app-name = "-";
                set $.log_fixed = 1;
            }
        }

        # Aruba AP logs are a mess: no tag field (for some logs)
        # <142>Dec  6 23:04:36 2023 10.109.21.206 <10.109.21.206 C8:A5:DA:E3:21:87> snmp[5403]: ...
        # <142>Dec  6 23:04:36 2023 10.109.21.206 <10.109.21.206 C8:A5:DA:E3:21:87> dnsmasq[10711]: ...
        # Move the <IP MAC> part at the begining of the message.
        if ($.log_fixed != 1 and $app-name startswith "<") then {
            unset $.norm;
            action(
                type="mmnormalize"
                name="norm-fix-aruba-ap"
                rulebase=`echo $LIBLOGNORM_RULEBASES/fix-aruba-ap.rb`
                variable="rawmsg"
                path="$.norm"
            )
            if ($parsesuccess == "OK") then {
                set $.app-name = $.norm!app-name;
                set $.procid = $.norm!procid;
                set $.msg = "<" &  $.norm!before-tag!ip & " " & $.norm!before-tag!mac & ">  " & $.norm!msg;
                set $.log_fixed = 1;
            }
        }
    } # end else
} # end if ($protocol-version == 0)
