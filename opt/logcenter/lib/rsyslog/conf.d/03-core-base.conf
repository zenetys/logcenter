##
## Globals
##

# On-demand debug gets toggled with signal USR1.
$debuglevel 1
# Set debug.logfile via environement with RSYSLOG_DEBUGLOG instead or
# config check fails: https://github.com/rsyslog/rsyslog/issues/1129
#global(debug.logfile=`echo $ZLC_LOG_DIR/rsyslog.debug`)

# Handle lots of file descriptors.
$maxopenfiles 10000

# Override default umask. Setting a value of 0027 allows to honor omfile
# dircreatemode="0750" and filecreatemode="0640".
global(umask="0027")

# Should be before any input.
global(maxmessagesize=`echo $ZLC_MAX_MESSAGE_SIZE`)

# Easier debug and usage in containers.
global(shutdown.enable.ctlc="on")

# When enabled, DNS lookups will set $fromhost.
global(reverselookup.cache.ttl.default="86400")
global(reverselookup.cache.ttl.enable="on")
global(net.enabledns=`echo $ZLC_USE_DNS`)
global(preservefqdn="on")

# More flexible.
global(parser.permitslashinprogramname="on")

# Preserve newlines in messages for later escape in templates at
# output time. It allows for instance json encode of multilines
# messages, but be careful in outputs.
global(parser.escapecontrolcharactersonreceive="off")

##
## Modules
##

# Custom template to be used by omfile, see below.
template (name="template-file-format" type="list") {
    property(name="timereported" dateformat="rfc3339")
    constant(value=" ")
    property(name="$.hostname")
    constant(value=" ")
    property(name="$.app-name")
    property(name="$.bracket-pid")
    constant(value=":")
    property(name="$.msg" spifno1stsp="on")
    property(name="$.msg" controlcharacters="escape" droplastlf="on")
    constant(value="\n")
}

# Redefine default file template, mostly for control chars because they
# are kept. See configuration globals. The equivalent default statement
# needs to be commented out in main rsyslog.conf if present.
## FIXME
# module(load="builtin:omfile" template="template-file-format")

module(load="imudp" config.enabled=`echo $ZLC_LISTEN_UDP`)
module(load="imtcp" maxsessions="5000" config.enabled=`echo $ZLC_LISTEN_TCP`)
module(load="imrelp" config.enabled=`echo $ZLC_LISTEN_RELP`)

module(
    config.enabled=`echo $ZLC_LOAD_IMPSTATS`
    load="impstats"
    interval="60"
    log.syslog="on"
    format="json-elasticsearch"
    resetcounters="on"
)

module(load="mmutf8fix")
module(load="mmpstrucdata")
module(load="mmnormalize")

module(load="omrelp")
module(load="omprog")
module(load="omelasticsearch")

module(load="fmunflatten" config.enabled=`echo $ZLC_LOAD_UNFLATTEN`)

##
## Main queue
##

main_queue(
    queue.type="LinkedList"
    queue.size="40000"
    queue.timeoutenqueue="0"
    queue.dequeuebatchsize="200"
    queue.workerthreads="2"
    queue.workerthreadminimummessages="10000"

    # disk assisted queue
    queue.maxfilesize="25m"
    queue.maxdiskspace="1g"
    queue.saveonshutdown="on"
    queue.filename="main"
)

##
## Parsers
##

parser(
    name="parser-local-rfc3164"
    type="pmrfc3164"
    permit.slashesinhostname="on"
    permit.atsignsinhostname="on"

    # Better having to fix logs by adding a wrong syslog tag in front of msg,
    # than by removing a prefix from the begining of msg to use it as app-name.
    #force.tagendingbycolon="on"

    # First space is removed via rainerscript, this is easier for fixing logs
    # without syslog tag.
    #remove.msgfirstspace="on"
 
    detect.yearaftertimestamp="on"
)

$rulesetparser rsyslog.rfc5424
$rulesetparser parser-local-rfc3164

##
## Templates
##

template(name="template-timereported" type="list") {
    property(name="timereported" dateformat="rfc3339")
}

template(name="template-timegenerated" type="list") {
    property(name="timegenerated" dateformat="rfc3339")
}

# Template that can be used to forward logs to a relay in rfc5424 format.
# It uses rsyslog vanilla properties but formats the hostname field as
# $hostname/$fromhost-ip. Octet-counted transmission should be used to
# handle the case were $msg contains newline characters.
template (name="template-forward-rfc5424-slash-srcip" type="list") {
    constant(value="<")
    property(name="pri")
    constant(value=">1 ")
    property(name="timereported" dateformat="rfc3339")
    constant(value=" ")
    property(name="hostname")
    constant(value="/")
    property(name="fromhost-ip")
    constant(value=" ")
    property(name="app-name")
    constant(value=" ")
    property(name="procid")
    constant(value=" ")
    property(name="msgid")
    constant(value=" ")
    property(name="structured-data")
    constant(value=" ")
    property(name="msg" droplastlf="on")
    constant(value="\n")
}

# Template that can be used to forward logs to a relay in rfc5424 format
# using custom $. properties. Those properties may be slightly different
# than vanilla properties in case of rewrite, log format fixing, etc.
template (name="template-forward-rfc5424-sd-zlc" type="list") {
    constant(value="<")
    property(name="pri")
    constant(value=">1 ")
    property(name="$.timereported-rfc3339")
    constant(value=" ")
    property(name="$.hostname")
    constant(value=" ")
    property(name="$.app-name")
    constant(value=" ")
    property(name="$.procid")
    constant(value=" ")
    property(name="msgid")
    constant(value=" ")
    constant(value="[zlc@0 srcIp=\"")
    property(name="$.fromhost-ip")
    constant(value="\" srcHost=\"")
    property(name="$.fromhost")
    constant(value="\" timeReceived=\"")
    property(name="$.timegenerated-rfc3339")
    constant(value="\"]")
    property(name="$.structured-data-or-empty")
    constant(value=" ")
    property(name="$.msg" droplastlf="on")
    constant(value="\n")
}
