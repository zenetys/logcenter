# Notes regarding rsyslog vanilla properties:
# - Rsyslog $hostname, assumed non empty, default "127.0.0.1".
# - Rsyslog $fromhost-ip, assumed non empty, default "127.0.0.1".
# - Rsyslog $fromhost, assumed non empty, default to $fromhost-ip if
#       lookup is enabled and failed.
# - Rsyslog $app-name, never seen it empty, default "-".
# - Rsyslog $procid, seen empty ex: <1>host prog[] msg.
# - Rsyslog $syslogtag can be empty and does NOT default to "-".
# - Rsyslog $structured-data, never seen it empty, default "-".
#
# When there are syslog relays in place, in order to keep track of the original
# source IP, it is common to append /$fromhost-ip to the $hostname field before
# relaying a message. This trick works with rfc3164 as well as rfc5434.
# Example:
# - Sending host will produce:
#       (a) $hostname = websrv1 (as usual, which could also be an IP)
#       (b) $hostname = websrv1/srcip1 (or may send both)
# - Syslog relay #1 append the source IP and forward as
#       (a) $hostname = websrv1/srcip1
#       (b) $hostname = websrv1/srcip1/srcip1
# - Syslog relay #2 append the source IP and forward as
#       (a) $hostname = websrv1/srcip1/srcip2
#       (b) $hostname = websrv1/srcip1/srcip1/srcip2
# - etc.
#
# In the end, we can try to parse the $hostname field with mmnormalize as
# $.hostname[/$.fromhost-ip[/...]] and stick to vanilla rsyslog properties
# if parsing fails.

action(
    type="mmnormalize"
    name="norm-hostname-slash-ip"
    rulebase=`echo $LIBLOGNORM_RULEBASES/hostname-slash-ip.rb`
    variable="hostname"
    path="$."
)

# make that bloc a ruleset so it is callable from the parsing ruleset as well
ruleset(name="ruleset-sd-zlc") {
    if ($structured-data startswith "[zlc@0 ") then {
        # SD element [zlc@0 ...] may be used to carry internal data (relayed,
        # reinjected source data). When used, we assume it is first in
        # $structured-data and does not contain character ] in data. Here is
        # what is done here:
        # - Parse $structured-data to set or override properties in $.
        #   Note if parsers need other SD elements, they should test for
        #   not(exists($.rfc5424-sd)) before calling the mmpstrucdata action in
        #   order to avoid parsing twice.
        # - Set $.structured-data so it contains original $structured-data but
        #   without SD element [zlc@0 ...]
        action(type="mmpstrucdata" name="parse-sd-zlc" jsonroot=".")
        if ($.rfc5424-sd!zlc@0!srcIp != "") then
            set $.fromhost-ip = $.rfc5424-sd!zlc@0!srcIp;
        if ($.rfc5424-sd!zlc@0!timeReceived != "") then
            set $.timegenerated-rfc3339 = $.rfc5424-sd!zlc@0!timeReceived;
        if ($.rfc5424-sd!zlc@0!srcHost != "") then
            set $.fromhost = $.rfc5424-sd!zlc@0!srcHost;
        if ($.rfc5424-sd!zlc@0!rjId != "") then {
            set $.rj_id = $.rfc5424-sd!zlc@0!rjId;
            # in case of reinject, if no $.timegenerated-rfc5424 was given, use
            # the reported time instead
            if ($.timegenerated-rfc3339 == "") then
                set $.timegenerated-rfc3339 = exec_template("template-timereported");
        }
        set $.sd_zlc = field($structured-data, 93, 1);
        set $.sd_zlc_len = strlen($.sd_zlc);
        set $.structured-data = substring($structured-data, $.sd_zlc_len + 1,
            0 - $.sd_zlc_len - 1);
        # case when there is nothing left
        if ($.structured-data == "") then
            set $.structured-data = "-";
    }
}

call ruleset-sd-zlc

# not for this ruleset, reinject log probably sent to the wrong port
if ($.rj_id != "") then
    stop

# Windows event logs forarded by NXLog
# Copy JSON Hostname field to $.fromhost if DNS is enabled to handle WEF.
# Note: With WEF, NXLog seams to set syslog hostname field to the proper value as well.
# Note: Here NXLog config sets $SourceName = "nxlog-msvistalog"; to recognize Windows event logs.
if (`echo $ZLC_USE_DNS` == "on" and $app-name == "nxlog-msvistalog" and $msg startswith [" {", "{"]) then {
    if ($.fromhost == "") then
        set $.fromhost = $fromhost;
    if ((($msg endswith "#015" and parse_json(substring($msg, 0, -4), "\$.json_msg") == 0) or
         parse_json($msg, "\$.json_msg") == 0) and
        $.json_msg!Hostname != "") then {

        set $.json_msg!Hostname = tolower($.json_msg!Hostname);
        if (field($.fromhost, 46, 1) != field($.json_msg!Hostname, 46, 1)) then
            set $.fromhost = $.json_msg!Hostname;
    }
}
