# So far there is nothing easy to recognize a Forcepoint NGFW (SMC) log send
# in JSON format other than testing source IP or node name in CompId field.
# Here with test as follows:
# - program name is empty (dash "-")
# - raw JSON string starts with {"Timestamp":"
# - JSON field SenderType == "Firewall"
# - non-empty JSON fields LogId, NodeId, CompId

if ($.parsing_done != 1 and
    $.app-name == "-" and
    $.msg startswith "{\"Timestamp\":\"") then {

    if ((exists($.json_msg) or parse_json($.msg, "\$.json_msg") == 0) and
        $.json_msg!SenderType == "Firewall" and
        $.json_msg!LogId != "" and
        $.json_msg!NodeId != "" and
        $.json_msg!CompId != "") then {

        set $!forcepoint = $.json_msg;

        # Trust reported time, use it as @timestamp value.
        # To use the logcenter received time instead, you can create file
        # /etc/logcenter/rsyslog/parsing-post.d/49-forcepoint-ngfw-json.conf
        # with following content:
        # if ($!data_stream.dataset == "fw.forcepoint") then
        #    unset $!@timestamp;
        set $!@timestamp = $!forcepoint!Timestamp;

        #mapping
        #if ($!forcepoint!Sport != "") then set $!forcepoint!Sport = cnum($!forcepoint!Sport);
        #if ($!forcepoint!Dport != "") then set $!forcepoint!Dport = cnum($!forcepoint!Dport);
        #if ($!forcepoint!NatSport != "") then set $!forcepoint!NatSport = cnum($!forcepoint!NatSport);
        #if ($!forcepoint!NatDport != "") then set $!forcepoint!NatDport = cnum($!forcepoint!NatDport);
        #if ($!forcepoint!SrcVlan != "") then set $!forcepoint!SrvcVlan = cnum($!forcepoint!SrcVlan);
        #if ($!forcepoint!Srcif != "") then set $!forcepoint!Srcif = cnum($!forcepoint!Srcif);
        #if ($!forcepoint!Dstif != "") then set $!forcepoint!Dstif = cnum($!forcepoint!Dstif);
        if ($!forcepoint!Protocol != "") then {
            set $!forcepoint!ProtocolName = lookup("lookup-iana-proto-num2name", $!forcepoint!Protocol);
            #set $!forcepoint!Protocol = cnum($!forcepoint!Protocol);
        }

        set $!tags = $!tags & ",fw,forcepoint";
        set $!data_stream.dataset = "firewall.forcepoint";
        set $.parsing_done = 1;
    }
}
