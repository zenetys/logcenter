# So far there is nothing easy to recognize a Forcepoint NGFW (SMC) log send
# in JSON format other than testing source IP or node name in CompId field.
# Here with test as follows:
# - program name is empty (dash "-")
# - raw JSON string starts with {"Timestamp":"
# - JSON field SenderType == "Firewall"
# - non-empty JSON fields LogId, NodeId, CompId

if ($.parsing_done != 1 and
    $.app-name == "-" and
    $.msg startswith "{\"Timestamp\":\"") then {

    # Forcepoint SMC version 7.1.4 produces invalid JSON logs in object
    # property RELATEDCONNECTIONREF because an extra comma may get added
    # before the closing brace "}" of the object (Forcepoint case
    # 00909126). However rsyslog parses it correctly!

    if ((exists($.json_msg) or parse_json($.msg, "\$.json_msg") == 0) and
        $.json_msg!SenderType == "Firewall" and
        $.json_msg!LogId != "" and
        $.json_msg!NodeId != "" and
        $.json_msg!CompId != "") then {

        # JSON gets decoded as forcepoint.* properties. A few standard ECS
        # fields are set below but the majority are aliased from forcepoint.*
        # ones via elasticsearch mapping.

        set $!forcepoint = $.json_msg;
        set $!event.kind = "event";

        if ($!forcepoint!Src != "" and $!forcepoint!Dst != "") then {
            set $!event.category = "network";
            set $!event.category = "connection";

            if ($!forcepoint.Action == "Allow") then {
                set $!event.type = "start,allowed";
                set $!event.outcome = "success";
            }
            else if ($!forcepoint.Action == ["Discard","Refuse"]) then {
                set $!event.type = "denied";
                set $!event.outcome = "failure";
            }
            else if ($!forcepoint!Action startswith ["Terminate","Block"]) then {
                set $!event.type = "denied";
                set $!event.outcome = "failure";
            }
            else if ($!forcepoint!Situation == "Connection_Closed") then {
                set $!event.type = "end";
                set $!event.outcome = "success";
            }
            else if ($!forcepoint!Situation == "Connection_Closed-Abnormally") then {
                set $!event.type = "end";
                set $!event.outcome = "failure";
            }
        }

        # Trust reported time, use it as @timestamp value.
        # To use the logcenter received time instead, create for instance
        # /etc/logcenter/rsyslog/parsing-post.d/49-forcepoint-ngfw-json.conf:
        # if ($!data_stream.dataset == "fw.forcepoint") then
        #    unset $!@timestamp;
        set $!@timestamp = $!forcepoint!Timestamp;

        if ($!forcepoint!Url != "") then {
            set $.parse-url!input = $!forcepoint!Url;
            call ruleset-parse-url
            if ($.parse-url!success == 1) then
                set $!url = $.parse-url!output;
        }

        if ($!forcepoint!Protocol != "") then {
            set $!network.transport = lookup("lookup-iana-proto-num2name", $!network.iana_number);
        }

        # IP address and user fields are moved to ECS so that standard ZLC
        # geoip, related-ip and related-user ingest pipelines can work.
        if (exists($!forcepoint!Src)) then { set $!source.ip = $!forcepoint!Src; unset $!forcepoint!Src; }
        if (exists($!forcepoint!NatSrc)) then { set $!source.nat.ip = $!forcepoint!NatSrc; unset $!forcepoint!NatSrc; }
        if (exists($!forcepoint!Dst)) then { set $!destination.ip = $!forcepoint!Dst; unset $!forcepoint!Dst; }
        if (exists($!forcepoint!NatDst)) then { set $!destination.nat.ip = $!forcepoint!NatDst; unset $!forcepoint!NatDst; }
        if (exists($!forcepoint!Username)) then { set $!user.name = $!forcepoint!Username; unset $!forcepoint!Username; }
        # keep this one, dns.resolved_ip is split to array in a pipeline
        if (exists($!forcepoint!DnsAddr)) then { set $!dns.resolved_ip = $!forcepoint!DnsAddr; }

        if ($!forcepoint!RELATEDCONNECTIONREF!RefEventId != "") then
            set $!trace.id = $!forcepoint!RELATEDCONNECTIONREF!RefEventId;
        else if ($!forcepoint!EventId != "") then
            set $!trace.id = $!forcepoint!EventId;

        # normalize lowercase
        if ($!forcepoint!SenderType != "") then set $!forcepoint!SenderType = tolower($!forcepoint!SenderType);
        if ($!forcepoint!Action != "") then set $!forcepoint!Action = tolower($!forcepoint!Action);
        if ($!forcepoint!IpsAppid != "") then set $!forcepoint!IpsAppid = tolower($!forcepoint!IpsAppid);
        if ($!forcepoint!Service != "") then set $!forcepoint!Service = tolower($!forcepoint!Service);

        if ($!forcepoint!AccRxBytes != "" and $!forcepoint!AccTxBytes != "") then
            set $!network.bytes = cnum($!forcepoint!AccRxBytes) + cnum($!forcepoint!AccTxBytes);

        set $!tags = $!tags & ",fw,forcepoint";
        set $!data_stream.dataset = "firewall.forcepoint";
        set $.parsing_done = 1;
    }
}
