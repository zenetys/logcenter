if ($.parsing_done != 1 and
    ($.app-name == "Varonis - DatAlert" or
     substring($.msg, 0, 255) contains " Varonis - DatAlert: ")) then {

    # parsing is done in ingest
    set $!message = $rawmsg;

    set $!tags = $!tags & ",dsp,varonis";
    set $!data_stream.dataset = "varonis";
    set $.parsing_done = 1;
}
