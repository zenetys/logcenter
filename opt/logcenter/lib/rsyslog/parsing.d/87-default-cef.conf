if ($.parsing_done != 1 and
    $.app-name == "-" and
    $.msg startswith "CEF:0|") then {

    action(
        type="mmnormalize"
        name="norm-cef"
        variable="$.msg"
        path="$!cef"
        rule=[ "rule=:%.:cef%" ]
    )
    if ($parsesuccess == "OK") then {
        call ruleset-cef-common-mapping

        set $!tags = $!tags & ",cef";
        set $!data_stream.dataset = "cef";
        set $.parsing_done = 1;
    }
}
