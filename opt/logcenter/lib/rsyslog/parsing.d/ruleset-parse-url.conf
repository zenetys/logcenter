# Input: $.parse-url!input
# Output: $.parse-url!output
# Result: success if $.parse-url!success == 1

ruleset(name="ruleset-parse-url") {
    unset $.parse-url!output;

    if ($.parse-url!input startswith "/") then {
        action(
            type="mmnormalize"
            name="norm-url-path"
            rulebase="url-path.rb"
            variable="$.parse-url!input"
            path="$.parse-url!output"
        )
    }
    else {
        action(
            type="mmnormalize"
            name="norm-url"
            rulebase="url.rb"
            variable="$.parse-url!input"
            path="$.parse-url!output"
        )
    }

    if ($parsesuccess == "OK") then {
        set $.parse-url!success = 1;

        # clean empty parts
        if ($.parse-url!output!scheme == "") then unset $.parse-url!output!scheme;
        if ($.parse-url!output!username == "") then unset $.parse-url!output!username;
        if ($.parse-url!output!password == "") then unset $.parse-url!output!password;
        if ($.parse-url!output!domain == "") then unset $.parse-url!output!domain;
        if ($.parse-url!output!port == "") then unset $.parse-url!output!port;
        if ($.parse-url!output!path == "") then unset $.parse-url!output!path;
        if ($.parse-url!output!query == "") then unset $.parse-url!output!query;
        if ($.parse-url!output!fragment == "") then unset $.parse-url!output!fragment;
    }
}
