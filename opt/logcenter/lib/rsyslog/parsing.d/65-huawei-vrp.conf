if ($.parsing_done != 1) then {

    if ($.try_parsers!huawei-vrp == 1 or
        ($.app-name startswith "%%" or
         $.msg startswith "OID ")) then {

        action(
            type="mmnormalize"
            rulebase="huawei-vrp.rb"
            name="norm-huawei-vrp1"
            variable="$.app-name"
            path="$!"
        )
        if ($parsesuccess == "OK") then {
            set $!event.original = $.app-name;
            set $!huawei.message = $.msg;
            if ($.procid != "") then {
                set $!event.original = $!event.original & "[" & $.procid & "]";
                set $!huawei.logseq = cnum($.procid);
            }
            set $!event.original = $!event.original & " " & $.msg;
            set $.parsing_done = 1;
        }
    }

    # Case when log was fixed because of malformed rfc3164 date / host
    # fields: $rawmsg-after-pri was moved to $.msg
    if ($.parsing_done != 1 and
        ($.try_parsers!huawei-vrp == 1 or
         ($.app-name == "-" and
          substring($.msg, 0, 255) contains [" %%", ":OID "]))) then {

        action(
            type="mmnormalize"
            rulebase="huawei-vrp.rb"
            name="norm-huawei-vrp2"
            variable="$.msg"
            path="$!"
        )
        if ($parsesuccess == "OK") then {
            set $!event.original = $.msg;
            if ($!huawei.hostname != "") then
                set $!host.name = $!huawei.hostname;
            set $.parsing_done = 1;
        }
    }

    if ($.parsing_done == 1) then {
        set $!tags = $!tags & ",huawei";
        set $!data_stream.dataset = "huawei.vrp";
    }
}
