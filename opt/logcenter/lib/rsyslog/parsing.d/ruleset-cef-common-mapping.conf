# Originally translated from elastic/beats sources:
# https://github.com/elastic/beats/blob/main/x-pack/filebeat/processors/decode_cef/keys.ecs.go
#
# TODO:
# - Need to double check bytesOut/bytesIn vs source.bytes/destination.bytes,
#   looks like it is reversed in filebeat source code; there may also be a
#   difference between fortinet and forcepoint logs.

# Use "call ruleset-cef-common-mapping" as if it was a function or a
# subroutine. Note: this is ment to be synchronous, so without queue (or
# with queue.type="direct" on rsyslog >= 8.2110.0, see changelog).

ruleset(name="ruleset-cef-common-mapping") {
    # Rename CEF base fields to ECS.
    set $!observer.vendor = $!cef!DeviceVendor;
    unset $!cef!DeviceVendor;
    set $!observer.product = $!cef!DeviceProduct;
    unset $!cef!DeviceProduct;
    set $!observer.version = $!cef!DeviceVersion;
    unset $!cef!DeviceVersion;
    set $!event.code = $!cef!SignatureID;
    unset $!cef!SignatureID;
    set $!message = $!cef!Name;
    unset $!cef!Name;
    set $!event.severity = $!cef!Severity;
    unset $!cef!Severity;

    # Rename extensions to ECS (originaly imported from filebeat cef decoder).
    if ($!cef!Extensions!agt != "") then {
        set $!agent.ip = $!cef!Extensions!agt;
        unset $!cef!Extensions!agt;
    }
    else if ($!cef!Extensions!agentAddress != "") then {
        set $!agent.ip = $!cef!Extensions!agentAddress;
        unset $!cef!Extensions!agentAddress;
    }

    if ($!cef!Extensions!agentDnsDomain != "") then {
        set $!agent.name = $!cef!Extensions!agentDnsDomain;
        unset $!cef!Extensions!agentDnsDomain;
    }
    else if ($!cef!Extensions!ahost != "") then {
        set $!agent.name = $!cef!Extensions!ahost;
        unset $!cef!Extensions!ahost;
    }
    else if ($!cef!Extensions!agentHostName != "") then {
        set $!agent.name = $!cef!Extensions!agentHostName;
        unset $!cef!Extensions!agentHostName;
    }

    if ($!cef!Extensions!aid != "") then {
        set $!agent.id = $!cef!Extensions!aid;
        unset $!cef!Extensions!aid;
    }
    else if ($!cef!Extensions!agentId != "") then {
        set $!agent.id = $!cef!Extensions!agentId;
        unset $!cef!Extensions!agentId;
    }

    if ($!cef!Extensions!amac != "") then {
        set $!agent.mac = $!cef!Extensions!amac;
        unset $!cef!Extensions!amac;
    }
    else if ($!cef!Extensions!agentMacAddress != "") then {
        set $!agent.mac = $!cef!Extensions!agentMacAddress;
        unset $!cef!Extensions!agentMacAddress;
    }

    if ($!cef!Extensions!art != "") then {
        set $!event.created = $!cef!Extensions!art;
        unset $!cef!Extensions!art;
    }
    else if ($!cef!Extensions!agentReceiptTime != "") then {
        set $!event.created = $!cef!Extensions!agentReceiptTime;
        unset $!cef!Extensions!agentReceiptTime;
    }

    if ($!cef!Extensions!at != "") then {
        set $!agent.type = $!cef!Extensions!at;
        unset $!cef!Extensions!at;
    }
    else if ($!cef!Extensions!agentType != "") then {
        set $!agent.type = $!cef!Extensions!agentType;
        unset $!cef!Extensions!agentType;
    }

    if ($!cef!Extensions!av != "") then {
        set $!agent.version = $!cef!Extensions!av;
        unset $!cef!Extensions!av;
    }
    else if ($!cef!Extensions!agentVersion != "") then {
        set $!agent.version = $!cef!Extensions!agentVersion;
        unset $!cef!Extensions!agentVersion;
    }

    if ($!cef!Extensions!app != "") then {
        set $!network.application = $!cef!Extensions!app;
        unset $!cef!Extensions!app;
    }
    else if ($!cef!Extensions!applicationProtocol != "") then {
        set $!network.application = $!cef!Extensions!applicationProtocol;
        unset $!cef!Extensions!applicationProtocol;
    }

    if ($!cef!Extensions!out != "") then {
        set $!source.bytes = $!cef!Extensions!out;
        unset $!cef!Extensions!out;
    }
    else if ($!cef!Extensions!bytesOut != "") then {
        set $!source.bytes = $!cef!Extensions!bytesOut;
        unset $!cef!Extensions!bytesOut;
    }

    if ($!cef!Extensions!in != "") then {
        set $!destination.bytes = $!cef!Extensions!in;
        unset $!cef!Extensions!in;
    }
    else if ($!cef!Extensions!bytesIn != "") then {
        set $!destination.bytes = $!cef!Extensions!bytesIn;
        unset $!cef!Extensions!bytesIn;
    }

    if ($!source.bytes != "" and $!destination.bytes != "") then
        set $!network.bytes = $!source.bytes + $!destination.bytes;

    if ($!cef!Extensions!cat != "") then {
        set $!labels.category = $!cef!Extensions!cat;
        unset $!cef!Extensions!cat;
    }
    else if ($!cef!Extensions!deviceEventCategory != "") then {
        set $!labels.category = $!cef!Extensions!deviceEventCategory;
        unset $!cef!Extensions!deviceEventCategory;
    }

    if ($!cef!Extensions!customerExternalID != "") then {
        set $!organization.id = $!cef!Extensions!customerExternalID;
        unset $!cef!Extensions!customerExternalID;
    }
    if ($!cef!Extensions!customerURI != "") then {
        set $!organization.name = $!cef!Extensions!customerURI;
        unset $!cef!Extensions!customerURI;
    }
    if ($!cef!Extensions!dst != "") then {
        set $!destination.ip = $!cef!Extensions!dst;
        unset $!cef!Extensions!dst;
    }
    else if ($!cef!Extensions!destinationAddress != "") then {
        set $!destination.ip = $!cef!Extensions!destinationAddress;
        unset $!cef!Extensions!destinationAddress;
    }
    else if ($!cef!Extensions!c6a3 != "") then {
        set $!destination.ip = $!cef!Extensions!c6a3;
        unset $!cef!Extensions!c6a3;
    }

    if ($!cef!Extensions!destinationDnsDomain != "") then {
        set $!destination.domain = $!cef!Extensions!destinationDnsDomain;
        unset $!cef!Extensions!destinationDnsDomain;
    }
    if ($!cef!Extensions!dlat != "") then {
        set $!destination.geo.location.lat = $!cef!Extensions!dlat;
        unset $!cef!Extensions!dlat;
    }
    else if ($!cef!Extensions!destinationGeoLatitude != "") then {
        set $!destination.geo.location.lat = $!cef!Extensions!destinationGeoLatitude;
        unset $!cef!Extensions!destinationGeoLatitude;
    }

    if ($!cef!Extensions!dlong != "") then {
        set $!destination.geo.location.lon = $!cef!Extensions!dlong;
        unset $!cef!Extensions!dlong;
    }
    else if ($!cef!Extensions!destinationGeoLongitude != "") then {
        set $!destination.geo.location.lon = $!cef!Extensions!destinationGeoLongitude;
        unset $!cef!Extensions!destinationGeoLongitude;
    }

    if ($!cef!Extensions!dhost != "") then {
        set $!destination.domain = $!cef!Extensions!dhost;
        unset $!cef!Extensions!dhost;
    }
    else if ($!cef!Extensions!destinationHostName != "") then {
        set $!destination.domain = $!cef!Extensions!destinationHostName;
        unset $!cef!Extensions!destinationHostName;
    }

    if ($!cef!Extensions!dmac != "") then {
        set $!destination.mac = $!cef!Extensions!dmac;
        unset $!cef!Extensions!dmac;
    }
    else if ($!cef!Extensions!destinationMacAddress != "") then {
        set $!destination.mac = $!cef!Extensions!destinationMacAddress;
        unset $!cef!Extensions!destinationMacAddress;
    }

    if ($!cef!Extensions!dpt != "") then {
        set $!destination.port = $!cef!Extensions!dpt;
        unset $!cef!Extensions!dpt;
    }
    else if ($!cef!Extensions!destinationPort != "") then {
        set $!destination.port = $!cef!Extensions!destinationPort;
        unset $!cef!Extensions!destinationPort;
    }

    if ($!cef!Extensions!dpid != "") then {
        set $!destination.process.pid = $!cef!Extensions!dpid;
        unset $!cef!Extensions!dpid;
    }
    else if ($!cef!Extensions!destinationProcessId != "") then {
        set $!destination.process.pid = $!cef!Extensions!destinationProcessId;
        unset $!cef!Extensions!destinationProcessId;
    }

    if ($!cef!Extensions!dproc != "") then {
        set $!destination.process.name = $!cef!Extensions!dproc;
        unset $!cef!Extensions!dproc;
    }
    else if ($!cef!Extensions!destinationProcessName != "") then {
        set $!destination.process.name = $!cef!Extensions!destinationProcessName;
        unset $!cef!Extensions!destinationProcessName;
    }

    if ($!cef!Extensions!destinationServiceName != "") then {
        set $!destination.service.name = $!cef!Extensions!destinationServiceName;
        unset $!cef!Extensions!destinationServiceName;
    }
    if ($!cef!Extensions!destinationTranslatedAddress != "") then {
        set $!destination.nat.ip = $!cef!Extensions!destinationTranslatedAddress;
        unset $!cef!Extensions!destinationTranslatedAddress;
    }
    if ($!cef!Extensions!destinationTranslatedPort != "") then {
        set $!destination.nat.port = $!cef!Extensions!destinationTranslatedPort;
        unset $!cef!Extensions!destinationTranslatedPort;
    }
    if ($!cef!Extensions!duid != "") then {
        set $!destination.user.id = $!cef!Extensions!duid;
        unset $!cef!Extensions!duid;
    }
    if ($!cef!Extensions!destinationUserId != "") then {
        set $!destination.user.id = $!cef!Extensions!destinationUserId;
        unset $!cef!Extensions!destinationUserId;
    }

    if ($!cef!Extensions!duser != "") then {
        set $!destination.user.name = $!cef!Extensions!duser;
        unset $!cef!Extensions!duser;
    }
    else if ($!cef!Extensions!destinationUserName != "") then {
        set $!destination.user.name = $!cef!Extensions!destinationUserName;
        unset $!cef!Extensions!destinationUserName;
    }

    if ($!cef!Extensions!dpriv != "") then {
        set $!destination.user.group.name = $!cef!Extensions!dpriv;
        unset $!cef!Extensions!dpriv;
    }
    else if ($!cef!Extensions!destinationUserPrivileges != "") then {
        set $!destination.user.group.name = $!cef!Extensions!destinationUserPrivileges;
        unset $!cef!Extensions!destinationUserPrivileges;
    }

    if ($!cef!Extensions!act != "") then {
        set $!event.action = tolower($!cef!Extensions!act);
        unset $!cef!Extensions!act;
    }
    else if ($!cef!Extensions!deviceAction != "") then {
        set $!event.action = tolower($!cef!Extensions!deviceAction);
        unset $!cef!Extensions!deviceAction;
    }

    if ($!cef!Extensions!dvc != "") then {
        set $!observer.ip = $!cef!Extensions!dvc;
        unset $!cef!Extensions!dvc;
    }
    else if ($!cef!Extensions!deviceAddress != "") then {
        set $!observer.ip = $!cef!Extensions!deviceAddress;
        unset $!cef!Extensions!deviceAddress;
    }
    else if ($!cef!Extensions!c6a1 != "") then {
        set $!observer.ip = $!cef!Extensions!c6a1;
        unset $!cef!Extensions!c6a1;
    }

    if ($!cef!Extensions!deviceDirection == "0") then {
        set $!network.direction = "inbound";
        unset $!cef!Extensions!deviceDirection;
    }
    else if ($!cef!Extensions!deviceDirection == "1") then {
        set $!network.direction = "outbound";
        unset $!cef!Extensions!deviceDirection;
    }

    if ($!cef!Extensions!deviceDnsDomain != "") then {
        set $!observer.hostname = $!cef!Extensions!deviceDnsDomain;
        unset $!cef!Extensions!deviceDnsDomain;
    }
    else if ($!cef!Extensions!dvchost != "") then {
        set $!observer.hostname = $!cef!Extensions!dvchost;
        unset $!cef!Extensions!dvchost;
    }
    else if ($!cef!Extensions!deviceHostName != "") then {
        set $!observer.hostname = $!cef!Extensions!deviceHostName;
        unset $!cef!Extensions!deviceHostName;
    }

    if ($!cef!Extensions!dvcmac != "") then {
        set $!observer.mac = $!cef!Extensions!dvcmac;
        unset $!cef!Extensions!dvcmac;
    }
    else if ($!cef!Extensions!deviceMacAddress != "") then {
        set $!observer.mac = $!cef!Extensions!deviceMacAddress;
        unset $!cef!Extensions!deviceMacAddress;
    }

    if ($!cef!Extensions!DevicePayloadId != "") then {
        set $!event.id = $!cef!Extensions!DevicePayloadId;
        unset $!cef!Extensions!DevicePayloadId;
    }
    else if ($!cef!Extensions!devicePayloadId != "") then {
        set $!event.id = $!cef!Extensions!devicePayloadId;
        unset $!cef!Extensions!devicePayloadId;
    }

    if ($!cef!Extensions!dvcpid != "") then {
        set $!process.pid = $!cef!Extensions!dvcpid;
        unset $!cef!Extensions!dvcpid;
    }
    else if ($!cef!Extensions!deviceProcessId != "") then {
        set $!process.pid = $!cef!Extensions!deviceProcessId;
        unset $!cef!Extensions!deviceProcessId;
    }

    if ($!cef!Extensions!deviceProcessName != "") then {
        set $!process.name = $!cef!Extensions!deviceProcessName;
        unset $!cef!Extensions!deviceProcessName;
    }

    if ($!cef!Extensions!rt != "") then {
        set $!@timestamp = $!cef!Extensions!rt;
        unset $!cef!Extensions!rt;
    }
    else if ($!cef!Extensions!deviceReceiptTime != "") then {
        set $!@timestamp = $!cef!Extensions!deviceReceiptTime;
        unset $!cef!Extensions!deviceReceiptTime;
    }

    if ($!cef!Extensions!dtz != "") then {
        set $!event.timezone = $!cef!Extensions!dtz;
        unset $!cef!Extensions!dtz;
    }
    else if ($!cef!Extensions!deviceTimeZone != "") then {
        set $!event.timezone = $!cef!Extensions!deviceTimeZone;
        unset $!cef!Extensions!deviceTimeZone;
    }

    if ($!cef!Extensions!end != "") then {
        set $!event.end = $!cef!Extensions!end;
        unset $!cef!Extensions!end;
    }
    else if ($!cef!Extensions!endTime != "") then {
        set $!event.end = $!cef!Extensions!endTime;
        unset $!cef!Extensions!endTime;
    }

    if ($!cef!Extensions!eventId != "") then {
        set $!event.id = $!cef!Extensions!eventId;
        unset $!cef!Extensions!eventId;
    }

    if ($!cef!Extensions!externalId != "") then {
        set $!transaction.id = $!cef!Extensions!externalId;
        unset $!cef!Extensions!externalId;
    }

    if ($!cef!Extensions!outcome != "") then {
        set $!event.outcome = $!cef!Extensions!outcome;
        unset $!cef!Extensions!outcome;
    }
    else if ($!cef!Extensions!eventOutcome != "") then {
        set $!event.outcome = $!cef!Extensions!eventOutcome;
        unset $!cef!Extensions!eventOutcome;
    }

    if ($!cef!Extensions!fileCreateTime != "") then {
        set $!file.created = $!cef!Extensions!fileCreateTime;
        unset $!cef!Extensions!fileCreateTime;
    }
    if ($!cef!Extensions!fileId != "") then {
        set $!file.inode = $!cef!Extensions!fileId;
        unset $!cef!Extensions!fileId;
    }
    if ($!cef!Extensions!fileModificationTime != "") then {
        set $!file.mtime = $!cef!Extensions!fileModificationTime;
        unset $!cef!Extensions!fileModificationTime;
    }

    if ($!cef!Extensions!fname != "") then {
        set $!file.name = $!cef!Extensions!fname;
        unset $!cef!Extensions!fname;
    }
    else if ($!cef!Extensions!filename != "") then {
        set $!file.name = $!cef!Extensions!filename;
        unset $!cef!Extensions!filename;
    }

    if ($!cef!Extensions!filePath != "") then {
        set $!file.path = $!cef!Extensions!filePath;
        unset $!cef!Extensions!filePath;
    }
    if ($!cef!Extensions!filePermission != "") then {
        set $!file.group = $!cef!Extensions!filePermission;
        unset $!cef!Extensions!filePermission;
    }

    if ($!cef!Extensions!fsize != "") then {
        set $!file.size = $!cef!Extensions!fsize;
        unset $!cef!Extensions!fsize;
    }
    else if ($!cef!Extensions!fileSize != "") then {
        set $!file.size = $!cef!Extensions!fileSize;
        unset $!cef!Extensions!fileSize;
    }

    if ($!cef!Extensions!fileType != "") then {
        set $!file.type = $!cef!Extensions!fileType;
        unset $!cef!Extensions!fileType;
    }
    if ($!cef!Extensions!requestClientApplication != "") then {
        set $!user_agent.original = $!cef!Extensions!requestClientApplication;
        unset $!cef!Extensions!requestClientApplication;
    }
    if ($!cef!Extensions!requestContext startswith [ "http://", "https://" ]) then {
        set $!http.request.referrer = $!cef!Extensions!requestContext;
        unset $!cef!Extensions!requestContext;
    }
    if ($!cef!Extensions!requestMethod != "") then {
        set $!http.request.method = $!cef!Extensions!requestMethod;
        unset $!cef!Extensions!requestMethod;
    }

    if ($!cef!Extensions!request != "") then {
        set $!url.original = $!cef!Extensions!request;
        unset $!cef!Extensions!request;
    }
    else if ($!cef!Extensions!requestUrl != "") then {
        set $!url.original = $!cef!Extensions!requestUrl;
        unset $!cef!Extensions!requestUrl;
    }

    if ($!cef!Extensions!src != "") then {
        set $!source.ip = $!cef!Extensions!src;
        unset $!cef!Extensions!src;
    }
    else if ($!cef!Extensions!sourceAddress != "") then {
        set $!source.ip = $!cef!Extensions!sourceAddress;
        unset $!cef!Extensions!sourceAddress;
    }
    else if ($!cef!Extensions!c6a2 != "") then {
        set $!source.ip = $!cef!Extensions!c6a2;
        unset $!cef!Extensions!c6a2;
    }

    if ($!cef!Extensions!sourceDnsDomain != "") then {
        set $!source.domain = $!cef!Extensions!sourceDnsDomain;
        unset $!cef!Extensions!sourceDnsDomain;
    }

    if ($!cef!Extensions!slat != "") then {
        set $!source.geo.location.lat = $!cef!Extensions!slat;
        unset $!cef!Extensions!slat;
    }
    else if ($!cef!Extensions!sourceGeoLatitude != "") then {
        set $!source.geo.location.lat = $!cef!Extensions!sourceGeoLatitude;
        unset $!cef!Extensions!sourceGeoLatitude;
    }

    if ($!cef!Extensions!slong != "") then {
        set $!source.geo.location.lon = $!cef!Extensions!slong;
        unset $!cef!Extensions!slong;
    }
    else if ($!cef!Extensions!sourceGeoLongitude != "") then {
        set $!source.geo.location.lon = $!cef!Extensions!sourceGeoLongitude;
        unset $!cef!Extensions!sourceGeoLongitude;
    }

    if ($!cef!Extensions!shost != "") then {
        set $!source.domain = $!cef!Extensions!shost;
        unset $!cef!Extensions!shost;
    }
    else if ($!cef!Extensions!sourceHostName != "") then {
        set $!source.domain = $!cef!Extensions!sourceHostName;
        unset $!cef!Extensions!sourceHostName;
    }

    if ($!cef!Extensions!smac != "") then {
        set $!source.mac = $!cef!Extensions!smac;
        unset $!cef!Extensions!smac;
    }
    if ($!cef!Extensions!sourceMacAddress != "") then {
        set $!source.mac = $!cef!Extensions!sourceMacAddress;
        unset $!cef!Extensions!sourceMacAddress;
    }
    if ($!cef!Extensions!spt != "") then {
        set $!source.port = $!cef!Extensions!spt;
        unset $!cef!Extensions!spt;
    }
    else if ($!cef!Extensions!sourcePort != "") then {
        set $!source.port = $!cef!Extensions!sourcePort;
        unset $!cef!Extensions!sourcePort;
    }

    if ($!cef!Extensions!spid != "") then {
        set $!source.process.pid = $!cef!Extensions!spid;
        unset $!cef!Extensions!spid;
    }
    else if ($!cef!Extensions!sourceProcessId != "") then {
        set $!source.process.pid = $!cef!Extensions!sourceProcessId;
        unset $!cef!Extensions!sourceProcessId;
    }

    if ($!cef!Extensions!sproc != "") then {
        set $!source.process.name = $!cef!Extensions!sproc;
        unset $!cef!Extensions!sproc;
    }
    else if ($!cef!Extensions!sourceProcessName != "") then {
        set $!source.process.name = $!cef!Extensions!sourceProcessName;
        unset $!cef!Extensions!sourceProcessName;
    }

    if ($!cef!Extensions!sourceServiceName != "") then {
        set $!source.service.name = $!cef!Extensions!sourceServiceName;
        unset $!cef!Extensions!sourceServiceName;
    }
    if ($!cef!Extensions!sourceTranslatedAddress != "") then {
        set $!source.nat.ip = $!cef!Extensions!sourceTranslatedAddress;
        unset $!cef!Extensions!sourceTranslatedAddress;
    }
    if ($!cef!Extensions!sourceTranslatedPort != "") then {
        set $!source.nat.port = $!cef!Extensions!sourceTranslatedPort;
        unset $!cef!Extensions!sourceTranslatedPort;
    }

    if ($!cef!Extensions!suid != "") then {
        set $!source.user.id = $!cef!Extensions!suid;
        unset $!cef!Extensions!suid;
    }
    else if ($!cef!Extensions!sourceUserId != "") then {
        set $!source.user.id = $!cef!Extensions!sourceUserId;
        unset $!cef!Extensions!sourceUserId;
    }

    if ($!cef!Extensions!suser != "") then {
        set $!source.user.name = $!cef!Extensions!suser;
        unset $!cef!Extensions!suser;
    }
    else if ($!cef!Extensions!sourceUserName != "") then {
        set $!source.user.name = $!cef!Extensions!sourceUserName;
        unset $!cef!Extensions!sourceUserName;
    }

    if ($!cef!Extensions!spriv != "") then {
        set $!source.user.group.name = $!cef!Extensions!spriv;
        unset $!cef!Extensions!spriv;
    }
    else if ($!cef!Extensions!sourceUserPrivileges != "") then {
        set $!source.user.group.name = $!cef!Extensions!sourceUserPrivileges;
        unset $!cef!Extensions!sourceUserPrivileges;
    }

    if ($!cef!Extensions!start != "") then {
        set $!event.start = $!cef!Extensions!start;
        unset $!cef!Extensions!start;
    }
    else if ($!cef!Extensions!startTime != "") then {
        set $!event.start = $!cef!Extensions!startTime;
        unset $!cef!Extensions!startTime;
    }

    if ($!cef!Extensions!proto != "") then {
        set $!network.transport = tolower($!cef!Extensions!proto);
        unset $!cef!Extensions!proto;
    }
    else if ($!cef!Extensions!transportProtocol != "") then {
        set $!network.transport = tolower($!cef!Extensions!transportProtocol);
        unset $!cef!Extensions!transportProtocol;
    }

    if ($!cef!Extensions!type != "") then {
        set $!event.kind = $!cef!Extensions!type;
        unset $!cef!Extensions!type;
    }

    # Other Extensions renames to ECS.
    if ($!cef!Extensions!deviceExternalId != "") then {
        set $!observer.name = $!cef!Extensions!deviceExternalId;
        unset $!cef!Extensions!deviceExternalId;
    }
    if ($!cef!Extensions!deviceInboundInterface != "") then {
        set $!observer.ingress.interface.id = $!cef!Extensions!deviceInboundInterface;
        unset $!cef!Extensions!deviceInboundInterface;
    }
    if ($!cef!Extensions!deviceOutboundInterface != "") then {
        set $!observer.egress.interface.id = $!cef!Extensions!deviceOutboundInterface;
        unset $!cef!Extensions!deviceOutboundInterface;
    }
}
