if ($.parsing_done != 1 and
    $.app-name == "-" and
    substring($.msg, 0, 255) contains " devid=\"F") then {

    action(
        type="mmnormalize"
        rulebase="fortigate-kv-identification.rb"
        name="norm-fortigate-kv-identification"
        variable="$.msg"
        path="$!"
    )
    if ($parsesuccess == "OK") then {
        # parsing is done in ingest
        set $!event.original = $.msg;

        set $!tags = $!tags & ",fw,fortigate";
        set $!data_stream.dataset = "firewall.fortigate";
        set $.parsing_done = 1;
    }
}
