if ($.parsing_done != 1 and
    $.app-name == "elasticsearch" and
    $.msg startswith "{" and
    parse_json($.msg, "\$!") == 0) then {

    # Field event.dataset as "deprecation.elasticsearch" does not make sense,
    # it is reversed. This change follows what filebeat 8.13.0 does in
    # module/elasticsearch/deprecation/ingest/pipeline-json-8.yml.
    # See also https://github.com/elastic/elasticsearch/issues/83251.
    if ($!event.dataset == "deprecation.elasticsearch") then
        set $!event.dataset = "elasticsearch.deprecation";

    # Other stuff done in Filebeat ingest pipeline (this is NOT exhaustive).
    set $!service.type = "elasticsearch";

    #if ($!event.dataset == "elasticsearch.server") then
    #    set $!fileset.name = "server";
    #else if ($!event.dataset == "elasticsearch.deprecation") then
    #    set $!fileset.name = "deprecation";
    #else if ($!event.dataset == ["elasticsearch.index_indexing_slowlog", "elasticsearch.index_search_slowlog"]) then
    #    set $!fileset.name = "slowlog";
    #else if ($!event.dataset == "elasticsearch.audit") then
    #    set $!fileset.name = "audit";

    set $!event.kind = "event";
    set $!event.category = "database";
    if ($!elasticsearch.node.id != "") then
        set $!host.id = $!elasticsearch.node.id;

    if ($!elasticsearch.node.name != "") then
        set $!host.name = $!elasticsearch.node.name;
    if ($!log.level == ["ERROR", "FATAL"]) then
        set $!event.type = "error";
    else
        set $!event.type = "info";

    # Put all elasticsearch logs in the same indice / data stream for
    # convenience, even though ECS specs says event.dataset should match
    # data_stream.dataset. Keep control over all data_stream fields because
    # some elasticsearch logs include a value for them in JSON.
    set $!tags = $!tags & ",elasticsearch";
    set $!data_stream.dataset = "elasticsearch";
    unset $!data_stream.type;
    unset $!data_stream.namespace;
    set $.parsing_done = 1;
}
