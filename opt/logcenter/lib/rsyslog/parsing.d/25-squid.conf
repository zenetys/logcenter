if ($.parsing_done != 1 and
    $.app-name == ["squid", "(squid)", "(squid-1)"]) then {

    action(
        type="mmnormalize"
        rulebase="squid.rb"
        name="norm-squid"
        variable="$.msg"
        path="$!"
    )
    if ($parsesuccess == "OK") then {
        # @timestamp was set from the rulebase parsing. We use that value
        # because it has milliseconds accuracy and proxies should be correctly
        # time sync'ed. We set the reception time into event.created.
        set $!event.created = $.timegenerated-rfc3339;

        set $!event.kind = "event";

        if ($!bump != "") then { set $!squid.ssl.bump_mode = $!bump; unset $!bump; }
        if ($!sni != "") then { set $!squid.ssl.sni = $!sni; unset $!sni; }
        if ($!category != "") then { set $!url.category = $!category; unset $!category; }

        if ($!url.original startswith "error:" and
            not($!url.original startswith "error://")) then {

            set $!event.type = "error";
            set $!event.outcome = "failure";
            set $!squid.error = substring($!url.original, 6, 4096);
            unset $!url.original;
        }
        else {
            set $.parse-url!input = $!url.original;
            call ruleset-parse-url
            if ($.parse-url!success == 1) then
                set $!url = $.parse-url!output;

            if ($!squid.request_status contains "REDIRECT") then {
                # probably redirected to a block page
                set $!event.type = "denied";
                set $!event.outcome = "failure";
            }
            else if ($!squid.request_status contains "DENIED" or
                     $!squid.ssl.bump_mode == "terminate") then {
                set $!event.type = "denied";
                set $!event.outcome = "failure";
            }
            else {
                set $!event.type = "allowed";

                if ($!http.response.status_code == 0) then {
                    # assume squid.ssl.bump_mode terminate was already handled,
                    if ($!squid.request_status startswith "NONE" and
                        $!squid.ssl.bump_mode != "" and
                        $!http.response.bytes == 0) then
                        # it should the log for the server side connection
                        set $!event.outcome = "unknown";
                    else
                        set $!event.outcome = "failure";
                }
                else {
                    # success from the proxy point of view, not from the server
                    # point of view (eg: response code >= 400)
                    set $!event.outcome = "success";
                }
            }
        }

        set $!tags = $!tags & ",proxy,squid";
        set $!data_stream.dataset = "proxy.squid";
        set $.parsing_done = 1;
    }
}
