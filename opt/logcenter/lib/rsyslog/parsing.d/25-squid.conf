if ($.parsing_done != 1 and
    $.app-name == ["squid", "(squid)", "(squid-1)"]) then {

    action(
        type="mmnormalize"
        rulebase="squid.rb"
        name="norm-squid"
        variable="$.msg"
        path="$!"
    )
    if ($parsesuccess == "OK") then {
        # @timestamp was set from the rulebase parsing. We use that value
        # because it has milliseconds accuracy and proxies should be correctly
        # time sync'ed. We set the reception time into event.created.
        set $!event.created = $.timegenerated-rfc3339;

        set $!event.kind = "event";

        if ($!url.original != "") then {
            # Parse the URL
            action(
                type="mmnormalize"
                rulebase="url.rb"
                name="norm-squid-url"
                variable="$!url.original"
                path="$!url"
            )
        }

        if ($!squid.request_status contains "REDIRECT") then
            # probably denied by an url redirector
            set $!event.outcome = "unknown";
        else if ($!squid.request_status contains "DENIED") then {
            set $!event.type = "denied";
            set $!event.outcome = "failure";
        }
        else {
            set $!event.type = "allowed";
            if ($!squid.request_status contains "NONE" or
                     $!http.response.status_code == 0) then {
                set $!event.outcome = "failure";
            }
            else if ($!squid.request_status contains [ "MISS", "TUNNEL" ] and
                     $!squid.hierarchy_status contains "DIRECT" and
                     $!squid.last_peer != "-") then {
                set $!event.type = $!event.type & ",access";
                set $!destination.ip = $!squid.last_peer;
            }
        }

        set $!tags = $!tags & ",proxy,squid";
        set $!data_stream.dataset = "proxy.squid";
        set $.parsing_done = 1;
    }
}
