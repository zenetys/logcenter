if ($.parsing_done != 1 and
    $.app-name == "-" and
    $.msg startswith "CEF:0|" and
    tolower(field($.msg, 124, 3)) == "fortigate") then {

    action(
        type="mmnormalize"
        name="norm-cef-fortigate"
        variable="$.msg"
        path="$!cef"
        rule=[ "rule=:%.:cef%" ]
    )
    if ($parsesuccess == "OK") then {
        set $!tags = $!tags & ",fw,fortigate";
        set $!data_stream.dataset = "firewall.fortigate";
        set $.parsing_done = 1;
    }
}
