if ($.parsing_done != 1 and
    $.app-name == "radiusd") then {

    action(
        type="mmnormalize"
        rulebase="freeradius.rb"
        name="norm-freeradius"
        variable="$.msg"
        path="$!"
    )

    if ($parsesuccess == "OK") then {
        # Note: parsing of freeradius.request.pairs is do in ingest.

        # Assume we can trust reported time, though it won't have
        # milliseconds accuracy.
        set $!@timestamp = $.timereported-rfc3339;

        # Try to provide a default timezone for parsing @timestamp extracted
        # from freeradius logs in ingest.
        set $!_.tz = exec_template("template-timereported-tzoff");

        set $!tags = $!tags & ",freeradius";
        set $!data_stream.dataset = "freeradius";
        set $.parsing_done = 1;
    }
}
