if ($.parsing_done != 1 and
    ($.try_parsers contains "w3c" or
     $.app-name startswith ["http", "apache"])) then {

    action(
        type="mmnormalize"
        rulebase="w3c.rb"
        name="norm-w3c"
        variable="$.msg"
        path="$!"
    )
    if ($parsesuccess == "OK") then {
        # keep some raw data from syslog fields
        set $!log.syslog.appname = $.app-name;
        set $!event.original = $.msg;

        set $!event.kind = "event";

        if ($!http.response.status_code > 0 and $!http.response.status_code < 400) then
            set $!event.outcome = "success";
        else
            set $!event.outcome = "failure";

        if ($!http.response.body.bytes == "-") then
            set $!http.response.body.bytes = 0;
        else
            set $!http.response.body.bytes = cnum($!http.response.body.bytes);

        if ($!w3c.timestamp_date != "" and $!w3c.timestamp_time != "") then {
            set $!w3c.timestamp_raw = $!w3c.timestamp_date & " " & $!w3c.timestamp_time;
            unset $!w3c.timestamp_date;
            unset $!w3c.timestamp_time;
        }

        # try to provide a default timezone for parsing apache.timestamp_raw in ingest
        set $!_.tz = exec_template("template-timereported-tzoff");

        set $!tags = $!tags & ",w3c";
        set $!data_stream.dataset = "w3c";
        set $.parsing_done = 1;
    }
}
