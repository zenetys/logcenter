if ($.parsing_done != 1) then {
    set $!log.syslog.severity.code = cnum($syslogseverity);
    set $!log.syslog.severity.name = $syslogseverity-text;
    set $!log.syslog.facility.code = cnum($syslogfacility);
    set $!log.syslog.facility.name = $syslogfacility-text;
    set $!log.syslog.hostname = $.hostname;

    if ($.app-name != "-") then
        set $!log.syslog.appname = $.app-name;
    if ($.procid != "-") then
        set $!log.syslog.procid = $.procid;

    if ($.structured-data != "-") then {
        if (not(exists($.rfc5424-sd))) then
            action(type="mmpstrucdata" name="parse-sd-syslog" jsonroot=".")
        unset $.rfc5424-sd!zlc@0;
        set $!log.syslog.structured_data = $.rfc5424-sd;
    }

    if ($!message == "") then
        set $!message = $.msg;

    set $!data_stream.dataset = "syslog";
    set $.parsing_done = 1;
}
