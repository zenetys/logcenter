if ($.parsing_done != 1 and
    substring($.app-name, 0, 5) == "CISE_") then {

        set $!message =  "<" & $pri & ">" & $timereported & " " & $.hostname &
            " " & $.app-name & " " & $.msg;

        set $!data_stream.dataset = "cisco_ise.log";
        set $!data_stream.namespace = "ep";
        set $.parsing_done = 1;
}
