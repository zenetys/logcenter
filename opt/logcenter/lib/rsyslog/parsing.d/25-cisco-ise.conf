if ($.parsing_done != 1 and
    substring($.app-name, 0, 5) == "CISE_") then {

        set $!message =  "<" & $pri & ">" & $timereported & " " & $.hostname &
            " " & $.app-name & " " & $.msg;

        # try to provide a default timezone for the elasticsearch integration
        set $!_tmp.timezone = exec_template("template-timereported-tzoff");

        set $!tags = $!tags & ",cisco,ise";
        set $!data_stream.dataset = "cisco_ise.log";
        set $.es_pipeline = "zlc-pipeline-logs-cisco_ise";
        set $.parsing_done = 1;
}
