if ($.parsing_done != 1 and
    $.app-name == "rsyslogd-pstats" and
    $.msg startswith "{") then {

    if (parse_json(replace($.msg, "!", "_"), "\$.rsyslog") == 0) then {
        set $!data_stream.dataset = "rsyslogd.pstats";
        set $.parsing_done = 1;
    }
}
