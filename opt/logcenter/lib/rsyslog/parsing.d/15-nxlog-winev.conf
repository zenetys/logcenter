if ($.parsing_done != 1 and
    $.app-name == "nxlog-msvistalog" and
    $.msg startswith "{") then {

    if (exists($.json_msg) and $.json_msg!EventID != "") then {
        set $!nxlog!winev = $.json_msg;
        set $.parsing_done = 1;
    }
    else if (parse_json($.msg, "\$!nxlog!winev") == 0) then {
        set $.parsing_done = 1;
    }

    if ($.parsing_done == 1) then {
        set $!tags = $!tags & ",windows";
        set $!data_stream.dataset = "windows.events";
    }
}
