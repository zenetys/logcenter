if ($.parsing_done != 1 and
    $.try_parsers contains "cisco-esa-consolidated") then {

    # Logs are in CEF but some fields are not escaped properly so we
    # and fail to decode with a CEF parser (liblognorm). Parsing is done
    # via ingest pipeline.

    # used to route parsing in ingest
    set $!event.module = "consolidated_event";

    # keep some raw data from syslog fields
    set $!log.syslog.severity.code = cnum($syslogseverity);
    set $!log.syslog.severity.name = $syslogseverity-text;
    set $!log.syslog.facility.code = cnum($syslogfacility);
    set $!log.syslog.facility.name = $syslogfacility-text;
    set $!log.syslog.hostname = $.hostname;
    set $!log.syslog.appname = $.app-name;
    set $!event.original = $.msg;

    # try to provide a default timezone for parsing startTime/start
    # and endTime/end fields in ingest
    set $!_.tz = exec_template("template-timereported-tzoff");

    set $!tags = $!tags & ",antispam,cisco,esa";
    set $!data_stream.dataset = "cisco.esa";
    set $.parsing_done = 1;
}
