if ($.parsing_done != 1 and
    $syslogfacility == 1 and
    $.app-name == "-" and
    $.procid == "-" and
    $.msg startswith "1,2") then {

    action(
        type="mmnormalize"
        name="norm-panos"
        rulebase="panos.rb"
        variable="$.msg"
        path="$!panos"
    )
    if ($parsesuccess == "OK") then {
        set $!data_stream.dataset = "firewall.panos";
        set $.parsing_done = 1;
    }
}
