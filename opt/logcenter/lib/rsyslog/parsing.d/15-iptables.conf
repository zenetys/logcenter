# There are case where this parser won't match. Logs with the following
# substrings will most likely fail:
# - FRAG:%u
# - TRUNCATED
# - INCOMPLETE [%u bytes]
# - ID:%08x
# - OPT (...)
# - Unknown Ext Hdr %u

# syslog facility 0 is kern
if ($.parsing_done != 1 and
    $syslogfacility == 0) then {

    set $.sample = substring($.msg, 0, 128);
    if ($.sample contains "IN=" and
        $.sample contains " OUT=") then {

        action(
            type="mmnormalize"
            rulebase="iptables.rb"
            name="norm-iptables"
            variable="$.msg"
            path="$!"
        )
        if ($parsesuccess == "OK") then {
            # For some ICMP packets (eg: dest unreachable), the related
            # packet can be logged between brackets [SRC=...]. The
            # v2-iptables liblognorm parser does not support this format,
            # it needs to be done in two steps. In such case, first step
            # will give:
            # - iptables.left, before opening bracket
            # - iptables.related, inside brackets
            # - iptables.right, after closing bracket (may be empty)
            if ($!iptables.left == "") then {
                set $.parsing_done = 1;
            }
            else {
                set $.iptables1 = $!iptables.left & $!iptables.right;
                action(
                    type="mmnormalize"
                    rulebase="iptables.rb"
                    name="norm-iptables-related1"
                    variable="$.iptables1"
                    path="$!"
                )
                if ($parsesuccess == "OK") then {
                    # Now parse the related packet.
                    action(
                        type="mmnormalize"
                        rulebase="iptables.rb"
                        name="norm-iptables-related2"
                        variable="$!iptables.related"
                        path="$.iptables2"
                    )
                    if ($parsesuccess == "OK") then {
                        unset $!iptables.left;
                        unset $!iptables.related;
                        unset $!iptables.right;
                        set $!iptables.raw.related = $.iptables2!iptables.raw;
                        set $.parsing_done = 1;
                    }
                }
            }

            if ($.parsing_done == 1) then {
                set $!tags = $!tags & ",fw,iptables";
                set $!data_stream.dataset = "firewall.iptables";
            }
        }
    }
}
