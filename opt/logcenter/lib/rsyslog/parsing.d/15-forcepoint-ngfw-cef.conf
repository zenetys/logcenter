if ($.parsing_done != 1 and
    $.app-name == "-" and
    $.msg startswith "CEF:0|" and
    tolower(field($.msg, 124, 2)) == "forcepoint" and
    tolower(field($.msg, 124, 3)) == "firewall") then {

    action(
        type="mmnormalize"
        name="norm-cef-forcepoint-ngfw"
        variable="$.msg"
        path="$!cef"
        rule=[ "rule=:%.:cef%" ]
    )
    if ($parsesuccess == "OK") then {
        call ruleset-cef-common-mapping

        # Specific field renames.
        if ($!cef!Extensions!deviceFacility != "") then {
            set $!forcepoint.facility = $!cef!Extensions!deviceFacility;
            unset $!cef!Extensions!deviceFacility;
        }
        if ($!cef!Extensions!cat != "") then {
            set $!forcepoint.situation_type = $!cef!Extensions!cat;
            unset $!cef!Extensions!cat;
        }
        if ($!message != "") then {
            set $!forcepoint.situation = $!message;
            unset $!message;
        }

        if ($!cef!Extensions!msg != "") then {
            set $!message = $!cef!Extensions!msg;
            unset $!cef!Extensions!msg;
        }
        else if ($!cef!Extensions!message != "") then {
            set $!message = $!cef!Extensions!message;
            unset $!cef!Extensions!message;
        }

        if ($!cef!Extensions!cs1 != "") then {
            set $!rule.id = $!cef!Extensions!cs1;
            unset $!cef!Extensions!cs1;
            unset $!cef!Extensions!cs1Label;
        }
        if ($!cef!Extensions!cs2 != "") then {
            set $!rule.nat.id = $!cef!Extensions!cs2;
            unset $!cef!Extensions!cs2;
            unset $!cef!Extensions!cs2Label;
        }
        # Don't known about event.duration, it's nanoseconds!
        if ($!cef!Extensions!cs3 != "") then {
            set $!forcepoint.elapsed_time = $!cef!Extensions!cs3;
            unset $!cef!Extensions!cs3;
            unset $!cef!Extensions!cs3Label;
        }

        # Logs exported from the SMC have CEF field act=Discard missing.
        if ($!event.action == "" and $!forcepoint.situation == "Connection_Discarded") then
            set $!event.action = "Discard";

        # Mixup between network.transport and network.iana_number
        if ($!network.transport != "") then {
            set $!network.iana_number = $!network.transport;
            set $!network.transport = lookup("lookup-iana-proto-num2name", $!network.iana_number);
        }

        # Use received timestamp instead of CEF rt field for ms precision.
        set $!@timestamp = $.timegenerated-rfc3339;

        set $!tags = $!tags & ",fw,forcepoint";
        set $!data_stream.dataset = "firewall.forcepoint";
        set $.parsing_done = 1;
    }
}
