if ($.parsing_done != 1 and
    $.app-name == "dnsmasq") then {

    action(
        type="mmnormalize"
        name="norm-dnsmasq"
        rulebase="dnsmasq.rb"
        variable="$.msg"
        path="$!"
    )

    if ($parsesuccess == "OK") then {
        set $!event.kind = "event";
        set $!event.category = "network";

        if ($!dnsmasq.service == "dns") then {
            if ($!dnsmasq.context == "query") then
                set $!dns.type = "query";
            else if ($!dnsmasq.answer != "" or $!dns.resolved_ip != "") then
                set $!dns.type = "answer";

            set $!event.type = "protocol";
            if ($!dns.type == "query") then
                set $!event.type = "connection," & $!event.type;
            set $!network.protocol = "dns";

            if ($!dnsmasq.query_type != "" and $!dns.question.type == "") then
                set $!dns.question.type = lookup("lookup-dns-rr-type2name", $!dnsmasq.query_type);

            set $!tags = $!tags & ",dns";
        }

        set $!data_stream.dataset = "dnsmasq.raw";
        set $.parsing_done = 1;
    }
}
