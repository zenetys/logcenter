if ($.parsing_done != 1 and
    $.msg startswith "{" and
    (exists($.json_msg) or parse_json($.msg, "\$.json_msg") == 0)) then {

    set $!json = $.json_msg;

    set $!data_stream.dataset = "json";
    set $.parsing_done = 1;
}
