if ($.parsing_done != 1 and
    $.try_parsers contains "drop-backtrace") then {

    action(
        type="mmnormalize"
        rulebase="backtrace.rb"
        name="norm-backtrace"
        variable="$.msg"
        path="$!"
    )
    if ($parsesuccess == "OK") then
        stop
}
