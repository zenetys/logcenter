if ($.parsing_done != 1 and
    $.app-name startswith "fenotify-" and
    $.msg startswith "{" and
    parse_json($.msg, "\$!fireeye") == 0 and
    tolower($!fireeye!product) contains "mps") then {

    # Create an event.severty from FireEye severity names. Try to map to syslog
    # severity numbers for consistency (the lower number the worst). It is
    # unclear if FireEye severity "unkn" can happen but it was seen in
    # FireEye to McAfee TIE flow for Node Red.
    # crit (2, crit), majr (3, err), minr (4, warning), unkn (5, notice)
    if ($!fireeye!alert!severity == "crit") then
        set $!event.severity = 2;
    else if ($!fireeye!alert!severity == "majr") then
        set $!event.severity = 3;
    else if ($!fireeye!alert!severity == "minr") then
        set $!event.severity = 4;
    else
        set $!event.severity = 5;

    if (exists($!fireeye!alert)) then {
        set $!event.kind = "alert";
        if ($!fireeye!alert!name contains "ips") then
            set $!event.category = "intrusion_detection";
        else
            set $!event.category = "malware";
    }
    else
        set $!event.kind = "event";

    set $!event.type = "info";

    set $!tags = $!tags & ",ips,fireeye";
    set $!data_stream.dataset = "ips.fireeye.mps";
    set $.parsing_done = 1;
}
