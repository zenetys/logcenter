if ($.parsing_done != 1 and
    ($.try_parsers!unify == 1 or
     (tolower(substring($.msg, 0, 29)) == "cef:0|ubiquiti|unifi network|"))) then {

    action(
        type="mmnormalize"
        name="norm-cef-unify"
        variable="$.msg"
        path="$!cef"
        rule=[ "rule=:%.:cef%" ]
    )

    if ($parsesuccess == "OK") then {
        # keep original for debug
        set $!event.original = $.msg;

        set $!tags = $!tags & ",wlan,unifi";
        set $!data_stream.dataset = "unifi";
        set $.parsing_done = 1;
    }
}
