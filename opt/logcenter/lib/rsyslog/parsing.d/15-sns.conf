if ($.parsing_done != 1 and
    ($.try_parsers!sns == 1 or
     ((substring($.msg, 0, 15) endswith "id=firewall " or $.msg startswith "id=firewall ") and
      (substring($.msg, strlen($.msg)-64, 999) contains " logtype=\"") and
      ($.msg endswith "\"")))) then {

    action(
        type="mmnormalize"
        rulebase="sns.rb"
        name="norm-sns"
        variable="$.msg"
        path="$!"
    )

    if ($parsesuccess == "OK") then {
        if ($!sns!time != "" and $!sns!fw != "" and $!sns!tz != "") then {
            # keep original for debug
            set $!event.original = $.msg;
            set $!event.kind = "event";

            if ($!sns!pri != "") then
                set $!log.level = lookup("lookup-syslog-severity-num2name", $!sns!pri);

            if ($!sns!src != "" and $!sns!origdst != "") then {
                set $!event.category = "network";
                set $!event.category = "connection";

                if ($!sns!action == "pass") then {
                    set $!event.type = "allowed";
                    set $!event.outcome = "success";
                }
                else if ($!sns!action == "block") then {
                    set $!event.type = "denied";
                    set $!event.outcome = "failure";
                }
            }

            # IP address and user fields are copied to ECS so that standard ZLC
            # geoip, related-ip and related-user ingest pipelines can work.
            if ($!sns!user != "") then set $!user.name = $!sns!user;

            # sns.origdst is only set when nat was applied; in such case
            # sns.dst is actually the nat'ed address, same for (orig)dstport
            if ($!sns!origdst == "") then {
                if ($!sns!dst != "") then set $!destination.ip = $!sns!dst;
            }
            else {
                set $!destination.ip = $!sns!origdst;
                if ($!sns!dst != "") then set $!destination.nat.ip = $!sns!dst;
            }
            # same for (orig)dstport
            if ($!sns!origdstport == "") then {
                if ($!sns!dstport != "") then set $!destination.port = cnum($!sns!dstport);
            }
            else {
                set $!destination.port = cnum($!sns!origdstport);
                if ($!sns!dstport != "") then set $!destination.nat.port = cnum($!sns!dstport);
            }

            # copy also source fields for consistency
            if ($!sns!src != "") then set $!source.ip = $!sns!src;
            if ($!sns!srcport != "") then set $!source.port = cnum($!sns!srcport);
            if ($!sns!modsrc != "") then set $!source.nat.ip = $!sns!modsrc;
            if ($!sns!modsrcport != "") then set $!source.nat.port = cnum($!sns!modsrcport);

            if ($!sns!rcvd != "" and $!sns!sent != "") then
                set $!network.bytes = cnum($!sns!rcvd) + cnum($!sns!sent);

            set $!tags = $!tags & ",fw,stormshield";
            set $!data_stream.dataset = "firewall.stormshield";
            set $.parsing_done = 1;
        }
        else {
            unset $!sns;
        }
    }
}
