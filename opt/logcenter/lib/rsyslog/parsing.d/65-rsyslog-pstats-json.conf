# Rsyslog replaces all "." by "!" in json keys:
# https://www.rsyslog.com/doc/configuration/modules/impstats.html#format
# In order to index prettier keys, we replace those "!" by "_".

if ($.parsing_done != 1 and
    $.app-name startswith "rsyslogd-pstats" and
    $.msg startswith "{" and
    parse_json(replace($.msg, "!", "_"), "\$.json_msg") == 0) then {

    set $!rsyslog = $.json_msg;

    # Add a field on core.queue stats to sum dicards.
    if ($!rsyslog!origin == "core.queue") then
        set $!rsyslog!discarded_total = $!rsyslog!discarded_full + $!rsyslog!discarded_nf;

    # Assume we can trust syslog hostname to be used as host.name and
    # that reported time is accurate.
    set $!host.name = $.hostname;
    set $!@timestamp = $.timereported-rfc3339;

    set $!tags = $!tags & ",rsyslog";
    set $!data_stream.dataset = "rsyslog.pstats";
    set $.parsing_done = 1;
}
