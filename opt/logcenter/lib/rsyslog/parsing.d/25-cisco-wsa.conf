if ($.parsing_done != 1 and
    ($.try_parsers contains "cisco-wsa" or
     $.app-name == "Cisco_WSA_access")) then {

    action(
        type="mmnormalize"
        rulebase="cisco-wsa.rb"
        name="norm-cisco-wsa"
        variable="$.msg"
        path="$!"
    )
    if ($parsesuccess == "OK") then {
        # Most blank fields will result in "-" values and are ment
        # to be cleaned-up via elastic ingest pipeline. Post-processing
        # on fields is done via ingest pipeline.

        # @timestamp was set from the rulebase parsing. We use that value
        # because it has milliseconds accuracy and proxies should be correctly
        # time sync'ed. We set the reception time into event.created.
        set $!event.created = $.timegenerated-rfc3339;

        if ($!cisco.wsa.result_code contains "DENIED") then {
            set $!event.type = "denied";
            set $!event.outcome = "failure";
        }
        else {
            set $!event.type = "allowed";
            if ($!cisco.wsa.result_code contains "NONE") then {
                set $!event.outcome = "failure";
            }
            else {
                # success from the proxy point of view, not from the server
                # point of view (eg: response code >= 400)
                set $!event.outcome = "success";
            }
        }

        set $!tags = $!tags & ",proxy,cisco,wsa";
        set $!data_stream.dataset = "proxy.cisco.wsa";
        set $.parsing_done = 1;
    }
}
