if ($.parsing_done != 1 and
    ($.log_type == "cisco-iosnx" or
     substring($.msg, 0, 255) contains " %")) then {

    action(
        type="mmnormalize"
        name="norm-cisco-iosnx-tag"
        rulebase="cisco-iosnx-tag.rb"
        variable="$.msg"
        path="$!"
    )
    if ($parsesuccess == "OK") then {
        # log.level from severity
        set $!log.level = lookup("lookup-syslog-severity-num2name", $!event.severity);

        # set message as %tag: message
        set $.header_len = strlen($!cisco.unparsed_header);
        set $!message = substring($.msg, $.header_len, -1 * $.header_len);
        set $.message_len = strlen($!message);
        set $!cisco.tag = substring(field($!message, 58, 1), 1, $.message_len);

        # Try to parse specific messages (might fail).
        action(
            type="mmnormalize"
            rulebase="cisco-iosnx-message.rb"
            name="norm-cisco-iosnx-message"
            variable="$!message"
            path="$!"
        )

        # <packet>.type
        if ($!_packet_type != "") then {
            if ($!network.transport == "igmp") then
                set $!igmp.type = $!_packet_type;
            else if ($!network.transport == "icmp") then
                set $!icmp.type = $!_packet_type;
            unset $!_packet_type;
        }

        # network.transport
        if ($!network.transport == "0") then
            unset $!network.transport;

        # vlan.id
        # Repeat for all interface fields set by rules
        if (tolower($!observer.ingress.interface.name) startswith "vlan") then {
            set $!observer.ingress.vlan.id = substring($!observer.ingress.interface.name,
                4, strlen($!observer.ingress.interface.name) - 4);
        }

        # source.mac
        if ($!source.mac) then
            set $!source.mac = tolower($!source.mac);

        # event.* categorization
        set $!event.kind = "event";
        if ($!event.action != "") then {
            set $!event.action = tolower($!event.action);
            if ($!event.action == [ "denied", "failed" ]) then {
                set $!event.outcome = "failure";
                if ($!event.category == "network") then
                    set $!event.type = "denied";
            }
            else if ($!event.action == [ "permitted", "succeeded" ]) then {
                set $!event.outcome = "success";
            }
            else {
                set $.message_last9 = substring($!message, $.message_len - 9, 9);
                if ($.message_last9 == "(SUCCESS)") then
                    set $!event.outcome = "success";
                else if ($.message_last9 == "(FAILURE)") then
                    set $!event.outcome = "failure";
            }
            # update / success available on Cisco NX
            if ($!event.category == "configuration" and
                $!event.action == "update" and
                $!event.outcome == "success") then
                set $!event.type = "change";
        }

        set $!data_stream.dataset = "cisco.sw";
        set $.parsing_done = 1;
    }

    # Case when parsing failed but a flag to force cisco-iosnx was set.
    else if ($.log_type == "cisco-iosnx") then {
        set $!event.kind = "event";
        set $!message = $.msg;

        set $!data_stream.dataset = "cisco.sw";
        set $.parsing_done = 1;
    }
}
