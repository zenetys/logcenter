if ($.parsing_done != 1 and
    $.app-name == "olfeo" and
    $.procid == "logd") then {

    action(
        type="mmnormalize"
        name="norm-olfeo"
        rulebase="olfeo.rb"
        variable="$.msg"
        path="$!"
    )
    if ($parsesuccess == "OK") then {
        set $!event.kind = "event";

        if ($!url.original != "") then {
            action(
                type="mmnormalize"
                name="norm-olfeo-url"
                rulebase="url.rb"
                variable="$!url.original"
                path="$!url"
            )
        }

        # liblognorm doesn't support negative integers, it is captured as string
        if ($!olfeo.policy_id != "") then
            set $!olfeo.policy_id = cnum($!olfeo.policy_id);

        set $!event.category = "network,web";
        if ($!olfeo.virus_name != "" and $!olfeo.virus_name != "-") then
            set $!event.category = $!event.category & ",malware";

        if ($!olfeo.request_status == 1) then {
            set $!event.type = "allowed,access";
            set $!event.outcome = "success";
        }
        else if ($!olfeo.request_status == 2) then {
            set $!event.type = "denied";
            set $!event.outcome = "failure";
        }
        else
            set $!event.outcome = "unknown";

        if ($!olfeo.policy_id == -2) then
            set $!event.provider = "connection";
        else if ($!olfeo.policy_id == -3) then
            set $!event.provider = "access";
        else if ($!olfeo.policy_id == -4) then
            set $!event.provider = "content";
        else if ($!olfeo.policy_id == -5) then
            set $!event.provider = "preview";
        else if ($!olfeo.policy_id > 0) then
            set $!event.provider = "policy";
        else
            set $!event.provider = "unknown";

        set $!olfeo.answer_reason = lookup("lookup-olfeo-answer-reason-code2name", $!olfeo.answer_reason_code);

        set $!tags = $!tags & ",proxy,olfeo";
        set $!data_stream.dataset = "proxy.olfeo";
        set $.parsing_done = 1;
    }
}
