if ($.parsing_done != 1 and
    ($.try_parsers contains "keycloak" or
     substring($.msg, 30, 14) == "[org.keycloak.")) then {

    action(
        type="mmnormalize"
        rulebase="keycloak.rb"
        name="norm-keycloak"
        variable="$.msg"
        path="$!"
    )
    if ($parsesuccess == "OK") then {
        # Merge keycloak.date and keycloak.time into keycloak.timestamp.
        # Note keycloak.time may use a comma to separate secondes from
        # milliseconds, chnage it to use a standard dot.
        set $!keycloak.timestamp = $!keycloak.date & " " & replace($!keycloak.time, ",", ".");
        unset $!keycloak.date;
        unset $!keycloak.time;

        # If app-name is 12 lowercase hex chars, it is likely a container id.
        if (strlen($.app-name) == 12 and $.app-name == tolower($.app-name)) then {
            action(
                type="mmnormalize"
                rulebase="hexstring.rb"
                name="norm-keycloak-container"
                variable="$.app-name"
                path="$.norm"
            )
            if ($parsesuccess == "OK") then
                set $!container.id = $.app-name;
        }
        if ($!container.id == "") then
            set $!log.syslog.appname = $.app-name;
        if ($.procid != "-") then
            set $!log.syslog.procid = $.procid;

        set $!tags = $!tags & ",keycloak";
        set $!data_stream.dataset = "keycloak";
        set $.parsing_done = 1;
    }
}
