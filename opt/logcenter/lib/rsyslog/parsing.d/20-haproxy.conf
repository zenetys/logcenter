if ($.parsing_done != 1 and
    $.app-name == ["haproxy", "hapee-lb"]) then {

    action(
        type="mmnormalize"
        rulebase="haproxy.rb"
        name="norm-haproxy"
        variable="$.msg"
        path="$!"
    )

    if ($parsesuccess == "OK") then {
        # Note: lots of post-processing, including parsing KV in haproxy.others,
        # is done on elasticsearch ingest.

        # Keep the log in event.original for troubleshooting parsing issues.
        set $!event.original = $.msg;

        # @timestamp was set from the rulebase parsing. We use that value
        # because it has milliseconds accuracy and proxies should be correctly
        # time sync'ed. We set the reception time into event.created.
        set $!event.created = $.timegenerated-rfc3339;

        # Parse url.original.
        if ($!url.original != ["","<BADREQ>"]) then {
            set $.parse-url!input = $!url.original;
            call ruleset-parse-url
            if ($.parse-url!success == 1) then
                set $!url = $.parse-url!output;
        }

        # Some fields need post-processing, mostly to drop integers without
        # value, convert strings to integers, ... so with can send to
        # elasticseach proper integers in JSON.

        if (exists($!haproxy.http.request.time_wait_ms)) then {
            if ($!haproxy.http.request.time_wait_ms == "-1") then unset $!haproxy.http.request.time_wait_ms;
            else set $!haproxy.http.request.time_wait_ms = cnum($!haproxy.http.request.time_wait_ms);
        }
        if (exists($!haproxy.total_waiting_time_ms)) then {
            if ($!haproxy.total_waiting_time_ms == "-1") then unset $!haproxy.total_waiting_time_ms;
            else set $!haproxy.total_waiting_time_ms = cnum($!haproxy.total_waiting_time_ms);
        }
        if (exists($!haproxy.connection_wait_time_ms)) then {
            if ($!haproxy.connection_wait_time_ms == "-1") then unset $!haproxy.connection_wait_time_ms;
            else set $!haproxy.connection_wait_time_ms = cnum($!haproxy.connection_wait_time_ms);
        }
        if (exists($!haproxy.http.request.time_wait_without_data_ms)) then {
            if ($!haproxy.http.request.time_wait_without_data_ms == "-1") then unset $!haproxy.http.request.time_wait_without_data_ms;
            else set $!haproxy.http.request.time_wait_without_data_ms = cnum($!haproxy.http.request.time_wait_without_data_ms);
        }
        if (exists($!http.response.status_code)) then {
            if ($!http.response.status_code == ["-1","0"]) then
                unset $!http.response.status_code;
            else {
                set $!http.response.status_code = cnum($!http.response.status_code);
                if ($!http.response.status_code < 400) then set $!event.outcome = "success";
                else set $!event.outcome = "failure";
            }
        }

        if (exists($!haproxy.connections.ssl_fc_err_hex)) then {
            if ($!haproxy.connections.ssl_fc_err_hex == "-") then unset $!haproxy.connections.ssl_fc_err_hex;
            else set $!haproxy.connections.ssl_fc_err_hex = "0x" & $!haproxy.connections.ssl_fc_err_hex;
        }
        if (exists($!haproxy.connections.ssl_c_err)) then {
            if ($!haproxy.connections.ssl_c_err == "-") then unset $!haproxy.connections.ssl_c_err;
            else set $!haproxy.connections.ssl_c_err = cnum($!haproxy.connections.ssl_c_err);
        }
        if (exists($!haproxy.connections.ssl_c_ca_err)) then {
            if ($!haproxy.connections.ssl_c_ca_err == "-") then unset $!haproxy.connections.ssl_c_ca_err;
            else set $!haproxy.connections.ssl_c_ca_err = cnum($!haproxy.connections.ssl_c_ca_err);
        }

        if ($!tls.client.server_name == "-") then unset $!tls.client.server_name;
        if ($!tls.version == "-") then { unset $!tls.version; unset $!tls.resumed; }
        if ($!tls.cipher == "-") then unset $!tls.cipher;

        if ($!haproxy.total_time_ms startswith "+") then {
            set $!haproxy.logasap = 1;
            set $!haproxy.total_time_ms = cnum(substring($!haproxy.total_time_ms, 1, 99));
        }
        if ($!haproxy.bytes_read startswith "+") then {
            set $!haproxy.logasap = 1;
            set $!haproxy.bytes_read = cnum(substring($!haproxy.bytes_read, 1, 99));
        }
        if ($!haproxy.connections.retries startswith "+") then {
            set $!haproxy.connections.redispatched = 1;
            set $!haproxy.connections.retries = cnum(substring($!haproxy.connections.retries, 1, 99));
        }

        if ($!haproxy.log.type == "http") then {
            set $!http.response.bytes = $!haproxy.bytes_read;
            set $!event.category = "web";
        }
        else if ($!haproxy.mode == "HTTP") then
            set $!event.category = "web";
        else if ($!haproxy.log.type == "tcp" or $!haproxy.mode == "TCP") then
            set $!event.category = "network";

        if (exists($!haproxy.log.truncated) or ($!url.original != "" and $!http.version == "")) then
            set $!haproxy.log.truncated = 1;

        set $!event.kind = "event";

        # Try to provide a default timezone for parsing @timestamp extracted
        # from haproxy logs in ingest.
        set $!_.tz = exec_template("template-timereported-tzoff");

        set $!tags = $!tags & ",rp,haproxy";
        set $!data_stream.dataset = "rp.haproxy";
        set $.parsing_done = 1;
    }
}
